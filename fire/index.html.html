<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Fire">
<title>Fire</title>
<style>
:root {
  --bg: #1a1a1a;
  --card: #242424;
  --card2: #2e2e2e;
  --ac: #c8a96e;
  --ac2: #7fb069;
  --tx: #f0e6d3;
  --mu: #888;
  --da: #d96b6b;
  --bo: #383838;
  --radius: 12px;
  --radius-sm: 7px;
  --gap: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--tx);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

#app { max-width: 740px; margin: 0 auto; }

/* ── Schermen ── */
.scherm { display: none; }
.scherm.actief { display: block; }

/* ── Gedeelde knoppen ── */
.btn-primair {
  background: var(--ac);
  color: #1a1a1a;
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: opacity .15s;
}
.btn-primair:active { opacity: .75; }
.btn-secundair {
  background: transparent;
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: 20px;
  padding: 9px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color .15s;
}
.btn-secundair:active { border-color: var(--ac); }
.btn-icon {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-icon:active { border-color: var(--da); color: var(--da); }
.btn-danger {
  background: transparent;
  border: 1px solid var(--da);
  color: var(--da);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-danger:active { background: var(--da); color: #fff; }
.btn-toevoegen {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 11px;
  background: transparent;
  border: 1px dashed var(--bo);
  border-radius: var(--radius);
  color: var(--mu);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  margin-top: 8px;
}
.btn-toevoegen:active { border-color: var(--ac); color: var(--ac); }

/* ── Formulier ── */
.form-veld { margin-bottom: 14px; }
.form-veld label {
  display: block;
  font-size: 11px;
  color: var(--mu);
  text-transform: uppercase;
  letter-spacing: .7px;
  margin-bottom: 5px;
}
.form-veld input,
.form-veld select,
.form-inp {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: var(--radius-sm);
  padding: 9px 10px;
  font-size: 14px;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}
.form-veld input:focus,
.form-veld select:focus,
.form-inp:focus { outline: none; border-color: var(--ac); }
.form-inp::placeholder { color: var(--mu); }
.form-rij { display: flex; gap: 10px; }
.form-rij .form-veld { flex: 1; }
.form-knoppen { display: flex; gap: 8px; margin-top: 6px; }
.form-knoppen .btn-primair { flex: 2; justify-content: center; }
.form-knoppen .btn-secundair { flex: 1; }

/* ── Startscherm ── */
.start-header {
  padding: 24px var(--gap) 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.start-logo { font-size: 22px; font-weight: 700; color: var(--ac); letter-spacing: -.3px; }

.gelegenheden-lijst { padding: 0 var(--gap) var(--gap); display: flex; flex-direction: column; gap: 8px; }
.geleg-kaart {
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.geleg-kaart:active { border-color: var(--ac); }
.geleg-info { flex: 1; min-width: 0; }
.geleg-naam { font-size: 15px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.geleg-meta { font-size: 11px; color: var(--mu); }
.geleg-acties { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.leeg-staat { padding: 48px var(--gap) 24px; text-align: center; color: var(--mu); font-size: 13px; line-height: 1.6; }
.leeg-staat p { margin-bottom: 20px; }

/* ── Gelegenheid: header ── */
.geleg-header {
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 11px var(--gap) 10px;
}
.geleg-header-top { display: flex; align-items: center; gap: 8px; }
.btn-terug {
  background: transparent;
  border: none;
  color: var(--ac);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-terug:active { opacity: .7; }
.geleg-header-midden { flex: 1; text-align: center; min-width: 0; }
.geleg-header-titel { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.geleg-header-meta { font-size: 11px; color: var(--mu); margin-top: 2px; text-align: center; }

/* ── Gelegenheid: tab-balk ── */
.tab-balk {
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 62px;
  z-index: 99;
}
.tab-balk::-webkit-scrollbar { display: none; }
.tab {
  padding: 11px 14px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 600;
  color: var(--mu);
  border-bottom: 2px solid transparent;
  border-top: none; border-left: none; border-right: none;
  background: transparent;
  transition: color .15s, border-color .15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.tab.actief { color: var(--ac); border-bottom-color: var(--ac); }

/* ── Tab-inhoud ── */
.tab-inhoud { display: none; padding: var(--gap); }
.tab-inhoud.actief { display: block; }
.tab-leeg { color: var(--mu); font-size: 13px; line-height: 1.6; text-align: center; padding: 32px 0 16px; }

/* ── Overzicht tab ── */
.ov-stats { display: flex; gap: 8px; margin-bottom: var(--gap); }
.ov-stat {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 10px;
  text-align: center;
}
.ov-stat-getal { font-size: 22px; font-weight: 700; color: var(--ac); display: block; }
.ov-stat-label { font-size: 10px; color: var(--mu); text-transform: uppercase; letter-spacing: .5px; }

.ov-recept-kaart {
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.ov-recept-kaart:active { border-color: var(--ac); }
.ov-recept-naam { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.ov-recept-meta { font-size: 11px; color: var(--mu); }
.tijdvenster-badge {
  font-size: 10px;
  color: var(--ac);
  background: var(--card2);
  border-radius: 10px;
  padding: 3px 8px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Recepten tab: chips ── */
.recept-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.recept-chip {
  padding: 6px 13px;
  border-radius: 20px;
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all .15s;
  white-space: nowrap;
  max-width: 150px;
  overflow: hidden;
  text-overflow: ellipsis;
  -webkit-tap-highlight-color: transparent;
}
.recept-chip.actief { background: var(--ac); color: #1a1a1a; border-color: var(--ac); }
.recept-chip.chip-plus {
  color: var(--ac);
  border-color: var(--ac);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Recept detail ── */
.recept-detail-naam {
  font-size: 17px;
  font-weight: 700;
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--bo);
  color: var(--tx);
  padding: 4px 0 6px;
  margin-bottom: 10px;
  font-family: inherit;
}
.recept-detail-naam:focus { outline: none; border-bottom-color: var(--ac); }

.recept-meta-rij { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.recept-bron {
  font-size: 10px;
  color: var(--mu);
  background: var(--card2);
  border-radius: 8px;
  padding: 3px 8px;
}
.recept-tv-select {
  font-size: 11px;
  color: var(--ac);
  background: var(--card2);
  border: none;
  border-radius: 10px;
  padding: 3px 8px;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}
.recept-tv-select:focus { outline: none; }

.schaler {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--card2);
  border-radius: var(--radius);
  padding: 9px 12px;
}
.schaler-label { font-size: 12px; color: var(--mu); flex: 1; }
.schaler-getal { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; }
.schaler-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--tx);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.schaler-btn:active { background: var(--ac); border-color: var(--ac); color: #1a1a1a; }
.schaler-btn:disabled { opacity: .3; cursor: default; }

.sectie-kop {
  font-size: 10px;
  color: var(--mu);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--bo);
}
.sectie-kop:first-of-type { margin-top: 0; }

.ing-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.ing-item:last-child { border-bottom: none; }
.ing-cb {
  width: 17px;
  height: 17px;
  border-radius: 5px;
  border: 1.5px solid var(--bo);
  background: var(--card2);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .15s;
  position: relative;
}
.ing-item.afgevinkt .ing-cb { background: var(--ac2); border-color: var(--ac2); }
.ing-item.afgevinkt .ing-cb::after {
  content: '';
  position: absolute;
  left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg);
}
.ing-item.afgevinkt .ing-tekst { text-decoration: line-through; color: var(--mu); }
.ing-tekst { font-size: 13px; line-height: 1.4; flex: 1; }

.stap-item {
  display: flex;
  gap: 9px;
  padding: 8px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  align-items: flex-start;
  -webkit-tap-highlight-color: transparent;
}
.stap-item:last-child { border-bottom: none; }
.stap-nr {
  width: 21px;
  height: 21px;
  border-radius: 50%;
  background: var(--ac);
  color: #1a1a1a;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: background .15s;
}
.stap-item.afgevinkt .stap-nr { background: var(--ac2); }
.stap-tekst-detail { font-size: 13px; line-height: 1.5; flex: 1; }
.stap-item.afgevinkt .stap-tekst-detail { color: var(--mu); text-decoration: line-through; }

.recept-acties {
  display: flex;
  gap: 8px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--bo);
}

/* ── Methode-selectie ── */
.methode-knoppen {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  padding: 24px 0 8px;
}
.methode-knop {
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 22px 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--tx);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  transition: border-color .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.methode-knop:active { border-color: var(--ac); color: var(--ac); }

/* ── Laden ── */
.laden-staat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 56px var(--gap);
  text-align: center;
  color: var(--mu);
  font-size: 13px;
}
.laden-ring {
  width: 38px;
  height: 38px;
  border: 3px solid var(--bo);
  border-top-color: var(--ac);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Import-fout ── */
.import-fout {
  padding: 32px var(--gap);
  text-align: center;
  color: var(--tx);
  font-size: 13px;
  line-height: 1.7;
}
.import-fout-tekst { color: var(--da); margin-bottom: 16px; }

/* ── Recept-form modaal (full-screen) ── */
.modaal-fs {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  overflow-y: auto;
}
.modaal-fs.actief { display: block; }
.modaal-fs-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--gap);
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  position: sticky;
  top: 0;
  z-index: 1;
  gap: 10px;
}
.modaal-fs-titel { font-size: 14px; font-weight: 700; color: var(--ac); flex: 1; text-align: center; }
.modaal-fs-body { padding: var(--gap); max-width: 740px; margin: 0 auto; }
.form-sectie-kop { font-size: 13px; font-weight: 700; color: var(--tx); margin: 20px 0 10px; }

/* ── Ingrediënt-formrij ── */
.ing-form-rij {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 8px;
}
.ing-form-top { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
.ing-form-bot { display: flex; gap: 6px; align-items: center; }
.inp-hoeveelheid { width: 60px; flex-shrink: 0; padding: 7px 6px; }
.inp-eenheid { width: 56px; flex-shrink: 0; padding: 7px 6px; }
.inp-naam { flex: 1; }
.inp-opmerking { flex: 1; }
.inp-productgroep { flex: 1; }
.form-inp { padding: 7px 8px; font-size: 13px; }
.btn-rij-del {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  transition: color .15s;
  line-height: 1;
}
.btn-rij-del:active { color: var(--da); }

/* ── Stap-formrij ── */
.stap-form-rij {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 8px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.stap-form-nr {
  width: 21px; height: 21px;
  border-radius: 50%;
  background: var(--ac);
  color: #1a1a1a;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 7px;
}
.stap-form-body { flex: 1; }
.stap-form-textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: var(--radius-sm);
  padding: 7px 8px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 54px;
}
.stap-form-textarea:focus { outline: none; border-color: var(--ac); }
.stap-form-timer { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.stap-form-timer label { font-size: 11px; color: var(--mu); }
.stap-form-timer span { font-size: 11px; color: var(--mu); }
.inp-timer { width: 56px; flex-shrink: 0; padding: 5px 7px; font-size: 12px; }

/* ── Boodschappenlijst ── */
.boodschappen-groep { margin-bottom: 20px; }
.boodschappen-groep-kop {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--mu);
  padding: 0 0 8px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 6px;
}
.boodschap-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.boodschap-item:last-child { border-bottom: none; }
.boodschap-cb {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--bo);
  background: var(--card2);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .15s;
  position: relative;
}
.boodschap-item.afgevinkt .boodschap-cb { background: var(--ac2); border-color: var(--ac2); }
.boodschap-item.afgevinkt .boodschap-cb::after {
  content: '';
  position: absolute;
  left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg);
}
.boodschap-tekst { font-size: 13px; line-height: 1.4; flex: 1; }
.boodschap-item.afgevinkt .boodschap-tekst { text-decoration: line-through; color: var(--mu); }
.boodschappen-reset {
  margin-top: 8px;
  display: flex;
  justify-content: center;
}

/* ── Tijdlijn ── */
.tijdlijn-sectie { margin-bottom: 22px; }
.tijdlijn-sectie-kop {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--ac);
  padding: 0 0 8px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 6px;
}
.tijdlijn-recept {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.tijdlijn-recept:last-child { border-bottom: none; }
.tijdlijn-recept-naam { font-size: 13px; font-weight: 600; flex: 1; }
.tijdlijn-recept-preview { font-size: 12px; color: var(--mu); margin-top: 2px; line-height: 1.4; }
.tijdlijn-recept-body { flex: 1; }
.tijdlijn-chevron { color: var(--mu); flex-shrink: 0; }

/* ── Sheet modaal (gelegenheid) ── */
.modaal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modaal-overlay.actief { display: flex; }
.modaal {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px var(--gap) calc(var(--gap) + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 740px;
  max-height: 90vh;
  overflow-y: auto;
}
.modaal-titel { font-size: 16px; font-weight: 700; color: var(--ac); margin-bottom: 18px; }

/* ── Cook Mode ── */
.cook-mode {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 400;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.cook-mode.actief { display: block; }
.cook-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px var(--gap);
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  position: sticky;
  top: 0;
  z-index: 1;
}
.cook-titel {
  font-size: 16px;
  font-weight: 700;
  color: var(--ac);
  flex: 1;
  text-align: center;
  margin: 0 8px;
}
.cook-sluiten {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  flex-shrink: 0;
  transition: all .15s;
}
.cook-sluiten:active { border-color: var(--da); color: var(--da); }
.cook-body { padding: var(--gap); max-width: 740px; margin: 0 auto; }
.cook-sectie-kop {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--mu);
  padding: 0 0 8px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 8px;
  margin-top: 20px;
}
.cook-sectie-kop:first-child { margin-top: 0; }
/* Ingrediënten in cook mode: compact */
.cook-ing-item {
  font-size: 15px;
  line-height: 1.6;
  padding: 4px 0;
  color: var(--tx);
  border-bottom: 1px solid var(--bo);
}
.cook-ing-item:last-child { border-bottom: none; }
/* Stappen in cook mode: grote tikdoelen */
.cook-stap {
  display: flex;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  align-items: flex-start;
  -webkit-tap-highlight-color: transparent;
}
.cook-stap:last-child { border-bottom: none; }
.cook-stap-nr {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--ac);
  color: #1a1a1a;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.cook-stap.afgevinkt .cook-stap-nr { background: var(--ac2); }
.cook-stap-body { flex: 1; }
.cook-stap-tekst {
  font-size: 15px;
  line-height: 1.6;
  transition: color .15s;
}
.cook-stap.afgevinkt .cook-stap-tekst { color: var(--mu); text-decoration: line-through; }
/* Timer */
.cook-timer {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}
.cook-timer-btn {
  background: var(--card2);
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.cook-timer-btn.actief { border-color: var(--ac); color: var(--ac); }
.cook-timer-display {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--ac);
  min-width: 52px;
}
.cook-timer-display.op { color: var(--ac2); }
.cook-timer-display.verlopen { color: var(--da); }

/* SVG sprite */
svg.sprite { display: none; }
</style>
</head>
<body>

<script>
'use strict';

// ─── Storage shim ─────────────────────────────────────────────────────────────
if (!window.storage) {
  let _store = null;
  try {
    localStorage.setItem('fire:_test', '1');
    localStorage.removeItem('fire:_test');
    _store = localStorage;
    console.info('[Fire] localStorage shim actief');
  } catch (e) {
    console.warn('[Fire] in-memory shim actief (geen persistentie)');
  }
  const _mem = {};
  window.storage = {
    set: async (key, value) => { if (_store) _store.setItem('fire:' + key, value); else _mem[key] = value; },
    get: async (key) => {
      const v = _store ? _store.getItem('fire:' + key) : (_mem[key] ?? null);
      if (v === null || v === undefined) throw new Error('niet gevonden: ' + key);
      return { value: v };
    },
    list: async (prefix) => {
      const keys = [];
      if (_store) {
        for (let i = 0; i < _store.length; i++) {
          const k = _store.key(i);
          if (k && k.startsWith('fire:' + prefix)) keys.push(k.slice(5));
        }
      } else {
        for (const k of Object.keys(_mem)) { if (k.startsWith(prefix)) keys.push(k); }
      }
      return { keys };
    },
    delete: async (key) => { if (_store) _store.removeItem('fire:' + key); else delete _mem[key]; },
  };
}

// ─── Sleutels ────────────────────────────────────────────────────────────────
function stapAfgevinkSleutel(receptId, stapId) {
  return `${receptId}|${stapId}`;
}

// ─── Constanten ───────────────────────────────────────────────────────────────
const TIJDVENSTERS = {
  week_vooruit: 'Week vooruit',
  dag_ervoor: 'Dag ervoor',
  ochtend_van: 'Ochtend van',
  laatste_uur: 'Laatste uur',
  a_la_minute: 'À la minute',
};

const PRODUCTGROEPEN = {
  groente_fruit: 'Groente & fruit',
  zuivel_eieren: 'Zuivel & eieren',
  vlees_vis: 'Vlees & vis',
  brood_banket: 'Brood & banket',
  droge_waren: 'Droge waren',
  kruiden_specerijen: 'Kruiden & specerijen',
  olie_azijn_saus: 'Olie, azijn & saus',
  diepvries: 'Diepvries',
  drank: 'Drank',
  overig: 'Overig',
};

// ─── Strings ─────────────────────────────────────────────────────────────────
const STRINGS = {
  appNaam: 'Fire',
  opslagFout: 'Er ging iets mis bij het opslaan. Probeer het opnieuw.',
  leegStart: 'Nog geen gelegenheden. Maak je eerste gelegenheid aan om te beginnen.',
  verwijderGelegBevestiging: (naam) => `"${naam}" verwijderen? Dit kan niet ongedaan worden gemaakt.`,
  verwijderReceptBevestiging: (naam) => `Recept "${naam}" verwijderen?`,
};

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  scherm: 'start',
  gelegenheden: [],
  actieveGelegenheidId: null,
  actieveTab: 'overzicht',
  actieveReceptId: null,
  modaalModus: 'aanmaken',
};

// ─── ID-generatie ─────────────────────────────────────────────────────────────
function maakId(prefix) {
  return `${prefix}_${Date.now()}_${Math.random().toString(36).substring(2, 7)}`;
}

// ─── Storage-laag ─────────────────────────────────────────────────────────────
async function loadAllGelegenheden() {
  const lijst = [];
  try {
    const result = await window.storage.list('gelegenheden:');
    for (const key of result.keys) {
      try {
        const entry = await window.storage.get(key);
        lijst.push(JSON.parse(entry.value));
      } catch (e) { console.warn('[Fire] kon gelegenheid niet laden:', key, e); }
    }
  } catch (e) { console.warn('[Fire] storage.list mislukt:', e); }
  sorteerGelegenheden(lijst);
  return lijst;
}

async function saveGelegenheid(gelegenheid) {
  gelegenheid.gewijzigd = new Date().toISOString();
  try {
    await window.storage.set(`gelegenheden:${gelegenheid.id}`, JSON.stringify(gelegenheid));
  } catch (e) {
    console.error('[Fire] saveGelegenheid mislukt:', e);
    throw e;
  }
}

async function deleteGelegenheid(id) {
  try { await window.storage.delete(`gelegenheden:${id}`); }
  catch (e) { console.error('[Fire] deleteGelegenheid mislukt:', e); throw e; }
}

function sorteerGelegenheden(lijst) {
  lijst.sort((a, b) => (b.datum || '').localeCompare(a.datum || ''));
}

// ─── Recept-helpers ───────────────────────────────────────────────────────────
function actieveGelegenheid() {
  return state.gelegenheden.find(g => g.id === state.actieveGelegenheidId) || null;
}

function voegReceptToe(g, recept) { g.recepten.push(recept); }

function verwijderRecept(g, receptId) {
  g.recepten = g.recepten.filter(r => r.id !== receptId);
}

function vindRecept(g, receptId) {
  return g.recepten.find(r => r.id === receptId) || null;
}

// ─── Schalen ──────────────────────────────────────────────────────────────────
function schaalHoeveelheid(hoeveelheid, origineel, geschaald, eenheid) {
  if (hoeveelheid === null) return null;
  const v = hoeveelheid * geschaald / origineel;
  if (eenheid === 'tl' || eenheid === 'el') return Math.round(v * 4) / 4;
  if (v < 10) return Math.round(v * 2) / 2;
  return Math.round(v);
}

function formateerIngredient(ing, origineel, geschaald) {
  const h = ing.hoeveelheid !== null
    ? schaalHoeveelheid(ing.hoeveelheid, origineel, geschaald, ing.eenheid)
    : null;
  const hTekst = h !== null ? (ing.eenheid ? `${h}\u202f${ing.eenheid}` : `${h}`) : '';
  const opm = ing.opmerking ? ` (${ing.opmerking})` : '';
  return [hTekst, ing.naam].filter(Boolean).join(' ') + opm;
}

// ─── Navigatie ────────────────────────────────────────────────────────────────
function toonScherm(naam) {
  document.querySelectorAll('.scherm').forEach(el => el.classList.remove('actief'));
  document.getElementById(`scherm-${naam}`).classList.add('actief');
  state.scherm = naam;
  window.scrollTo(0, 0);
}

function naarStartscherm() {
  state.actieveGelegenheidId = null;
  state.actieveReceptId = null;
  renderStartscherm();
  toonScherm('start');
}

// ─── Datum-helper ─────────────────────────────────────────────────────────────
function formateerDatum(iso) {
  if (!iso) return '';
  return new Date(iso + 'T00:00:00').toLocaleDateString('nl-NL', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

// ─── Startscherm ──────────────────────────────────────────────────────────────
function renderStartscherm() {
  const container = document.getElementById('geleg-inhoud');
  if (state.gelegenheden.length === 0) {
    container.innerHTML = `<div class="leeg-staat"><p>${STRINGS.leegStart}</p></div>`;
    return;
  }
  const items = state.gelegenheden.map(g => {
    const n = g.recepten.length;
    const datumTekst = g.datum ? `${formateerDatum(g.datum)} · ` : '';
    return `
      <div class="geleg-kaart" data-id="${g.id}" role="button" tabindex="0">
        <div class="geleg-info">
          <div class="geleg-naam">${escHtml(g.naam)}</div>
          <div class="geleg-meta">${datumTekst}${g.serveerTijd} · ${g.aantalPersonen} personen · ${n === 1 ? '1 recept' : n + ' recepten'}</div>
        </div>
        <div class="geleg-acties">
          <button class="btn-icon btn-verwijder-geleg" data-id="${g.id}" title="Verwijderen">
            <svg width="15" height="15"><use href="#ic-trash"/></svg>
          </button>
          <svg width="14" height="14" style="color:var(--mu)"><use href="#ic-chevron-right"/></svg>
        </div>
      </div>`;
  }).join('');
  container.innerHTML = `<div class="gelegenheden-lijst">${items}</div>`;

  container.querySelectorAll('.geleg-kaart').forEach(k => {
    k.addEventListener('click', (e) => { if (!e.target.closest('.btn-verwijder-geleg')) openGelegenheid(k.dataset.id); });
    k.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.target.closest('.btn-verwijder-geleg')) openGelegenheid(k.dataset.id); });

  container.querySelectorAll('.btn-verwijder-geleg').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); bevestigVerwijderGelegenheid(btn.dataset.id); });
  });
}

// ─── Cook Mode ────────────────────────────────────────────────────────────────
let _wakeLock = null;
let _cookReceptId = null;
const _timerStarts = {}; // stapId → Date.now() van start, of null

async function openCookMode(receptId) {
  _cookReceptId = receptId;
  renderCookMode();
  document.getElementById('cook-mode').classList.add('actief');
  document.body.style.overflow = 'hidden';
  await vraagWakeLock();
}

function sluitCookMode() {
  document.getElementById('cook-mode').classList.remove('actief');
  document.body.style.overflow = '';
  _cookReceptId = null;
  // Stop alle timers
  for (const id of Object.keys(_timerStarts)) delete _timerStarts[id];
  laatWakeLockLos();
}

async function vraagWakeLock() {
  if (!navigator.wakeLock) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {
    // Wake Lock niet beschikbaar of geweigerd — stilletjes doorgaan
  }
}

async function laatWakeLockLos() {
  if (_wakeLock) {
    try { await _wakeLock.release(); } catch (e) {}
    _wakeLock = null;
  }
}

// Heraan vragen na tab-switch terug
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && _cookReceptId && !_wakeLock) {
    await vraagWakeLock();
  }
});

function renderCookMode() {
  const g = actieveGelegenheid();
  const r = g ? g.recepten.find(r => r.id === _cookReceptId) : null;
  if (!r) { sluitCookMode(); return; }

  if (!g.afgevinkteStapKeys) g.afgevinkteStapKeys = [];
  const afgevinkt = new Set(g.afgevinkteStapKeys);

  document.getElementById('cook-titel').textContent = r.naam;

  const body = document.getElementById('cook-body');

  // Ingrediënten
  const ingHtml = r.ingredienten.length
    ? r.ingredienten.map(ing =>
        `<div class="cook-ing-item">${escHtml(formateerIngredient(ing, r.origineelAantalPersonen, r.geschaaldAantalPersonen))}</div>`
      ).join('')
    : `<p style="color:var(--mu);font-size:14px">Geen ingrediënten.</p>`;

  // Stappen
  const stappenHtml = r.stappen.length
    ? r.stappen.map(s => {
        const sleutel = stapAfgevinkSleutel(r.id, s.id);
        const isAf = afgevinkt.has(sleutel);
        const timerHtml = s.timerMinuten
          ? `<div class="cook-timer">
               <button class="cook-timer-btn" data-stap-id="${escHtml(s.id)}" data-minuten="${s.timerMinuten}">
                 Start timer (${s.timerMinuten} min)
               </button>
               <span class="cook-timer-display" id="timer-${escHtml(s.id)}"></span>
             </div>`
          : '';
        return `<div class="cook-stap${isAf ? ' afgevinkt' : ''}" data-sleutel="${escHtml(sleutel)}">
          <div class="cook-stap-nr">${s.nummer}</div>
          <div class="cook-stap-body">
            <div class="cook-stap-tekst">${escHtml(s.tekst)}</div>
            ${timerHtml}
          </div>
        </div>`;
      }).join('')
    : `<p style="color:var(--mu);font-size:14px">Geen stappen.</p>`;

  body.innerHTML = `
    <div class="cook-sectie-kop">Ingrediënten</div>
    <div id="cook-ings">${ingHtml}</div>
    <div class="cook-sectie-kop">Stappen</div>
    <div id="cook-stappen">${stappenHtml}</div>`;

  // Stap afvinken
  body.querySelectorAll('.cook-stap').forEach(el => {
    el.addEventListener('click', async (e) => {
      // Niet afvinken als op timer-knop geklikt
      if (e.target.closest('.cook-timer-btn')) return;
      const sleutel = el.dataset.sleutel;
      const set = new Set(g.afgevinkteStapKeys || []);
      if (set.has(sleutel)) set.delete(sleutel); else set.add(sleutel);
      g.afgevinkteStapKeys = [...set];
      try { await saveGelegenheid(g); } catch (e) {}
      el.classList.toggle('afgevinkt');
    });
  });

  // Timer-knoppen
  body.querySelectorAll('.cook-timer-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const stapId = btn.dataset.stapId;
      const minuten = parseInt(btn.dataset.minuten, 10);
      if (_timerStarts[stapId]) {
        // Reset
        delete _timerStarts[stapId];
        btn.textContent = `Start timer (${minuten} min)`;
        btn.classList.remove('actief');
        const display = document.getElementById(`timer-${stapId}`);
        if (display) { display.textContent = ''; display.className = 'cook-timer-display'; }
      } else {
        // Start
        _timerStarts[stapId] = Date.now() + minuten * 60 * 1000;
        btn.textContent = 'Stop timer';
        btn.classList.add('actief');
        tickTimer(stapId);
      }
    });
  });
}

function tickTimer(stapId) {
  if (!_timerStarts[stapId] || !_cookReceptId) return;
  const display = document.getElementById(`timer-${stapId}`);
  if (!display) return;
  const restMs = _timerStarts[stapId] - Date.now();
  if (restMs <= 0) {
    display.textContent = '0:00';
    display.className = 'cook-timer-display verlopen';
    delete _timerStarts[stapId];
    const btn = display.previousElementSibling;
    if (btn) { btn.classList.remove('actief'); btn.textContent = `Start timer`; }
    // Geluidje via korte AudioContext beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 1.2);
    } catch (e) {}
    return;
  }
  const totaalSec = Math.ceil(restMs / 1000);
  const min = Math.floor(totaalSec / 60);
  const sec = totaalSec % 60;
  display.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
  display.className = 'cook-timer-display actief';
  requestAnimationFrame(() => tickTimer(stapId));
}

// ─── AI-import ────────────────────────────────────────────────────────────────

const EXTRACTIE_PROMPT = `Je bent een assistent die recepten extraheert en omzet naar gestructureerd Nederlands. Regels:
1. Vertaal naar Nederlands. Behoud cultureel herkenbare namen (Tiramisu, Ratatouille).
2. Reken om naar metrisch: cups→ml/g, oz→g, fl oz→ml, lb→g, °F→°C, tbsp→el, tsp→tl.
3. Herken het originele aantal porties.
4. Per ingrediënt: hoeveelheid, eenheid, naam, productgroep (zie lijst).
5. Per stap: korte Nederlandse instructie.
6. Tijdvenster: week_vooruit, dag_ervoor, ochtend_van, laatste_uur, a_la_minute. Bij twijfel: ochtend_van.
7. Geef ALLEEN valide JSON terug, geen extra tekst of code blocks.

Productgroepen: groente_fruit, zuivel_eieren, vlees_vis, brood_banket, droge_waren, kruiden_specerijen, olie_azijn_saus, diepvries, drank, overig.

Output:
{"naam":"...","origineelAantalPersonen":4,"bereidingstijdMinuten":60,"tijdvenster":"ochtend_van","ingredienten":[{"hoeveelheid":500,"eenheid":"g","naam":"bloem","productgroep":"droge_waren","opmerking":""}],"stappen":[{"nummer":1,"tekst":"..."}]}

Geen recept gevonden: {"fout":"geen_recept_herkend","reden":"..."}`;

const API_URL = 'https://api.anthropic.com/v1/messages';
const API_HEADERS = {
  'content-type': 'application/json',
  'anthropic-version': '2023-06-01',
  'anthropic-dangerous-direct-browser-access': 'true',
};

async function roepApiAan(messages, timeout = 30000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: API_HEADERS,
      signal: controller.signal,
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4096, messages }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `API-fout ${resp.status}`);
    }
    const data = await resp.json();
    return data.content[0].text;
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('Het ophalen duurde te lang. Probeer opnieuw of voer het handmatig in.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function comprimeerFoto(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const max = 1280;
      let { width: w, height: h } = img;
      if (w > max || h > max) {
        if (w >= h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        if (!blob) { reject(new Error('Compressie mislukt')); return; }
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.8);
    };
    img.onerror = reject;
    img.src = url;
  });
}

async function importeerFoto(file) {
  toonReceptStap('laden');
  document.getElementById('laden-tekst').textContent = 'Foto wordt uitgelezen…';
  try {
    const base64 = await comprimeerFoto(file);
    const tekst = await roepApiAan([{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
        { type: 'text', text: EXTRACTIE_PROMPT },
      ],
    }]);
    verwerkImportResultaat(tekst, 'foto');
  } catch (e) {
    const msg = e.message || '';
    if (msg.toLowerCase().includes('api-key') || msg.includes('401')) {
      toonImportFout('Foto-import werkt alleen in de Claude Artifact-omgeving. Voer het recept handmatig in.');
    } else {
      toonImportFout(msg || 'Kon het recept niet uitlezen. Probeer een andere foto of voer het handmatig in.');
    }
  }
}

async function importeerLink(url) {
  toonReceptStap('laden');
  document.getElementById('laden-tekst').textContent = 'Recept wordt opgehaald…';

  if (!window.claude?.complete) {
    toonImportFout('Link-import werkt alleen in de Claude Artifact-omgeving. Voer het recept handmatig in.');
    return;
  }

  const prompt = `${EXTRACTIE_PROMPT}\n\nHaal het recept op van deze URL en extraheer het: ${url}`;
  try {
    const tekst = await window.claude.complete(prompt);
    verwerkImportResultaat(tekst, 'link');
  } catch (e) {
    toonImportFout(e.message || 'Kon het recept niet ophalen. Controleer de URL of voer het handmatig in.');
  }
}

function verwerkImportResultaat(jsonTekst, bronType) {
  // Strip eventuele code block markers
  const schoon = jsonTekst.replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/,'').trim();
  let data;
  try { data = JSON.parse(schoon); }
  catch (e) {
    toonImportFout('Het recept kon niet worden uitgelezen. Probeer een andere foto of voer het handmatig in.');
    return;
  }
  if (data.fout) {
    toonImportFout(`Geen recept herkend: ${data.reden || 'onbekende reden'}. Voer het handmatig in.`);
    return;
  }
  // Formulier vullen met geëxtraheerde data
  document.getElementById('rf-naam').value = data.naam || '';
  document.getElementById('rf-porties').value = data.origineelAantalPersonen || actieveGelegenheid()?.aantalPersonen || 4;
  document.getElementById('rf-tijdvenster').value = data.tijdvenster || 'ochtend_van';
  document.getElementById('rf-bereidingstijd').value = data.bereidingstijdMinuten || '';
  _formIngs = (data.ingredienten || []).map(i => ({
    id: maakId('fi'),
    hoeveelheid: i.hoeveelheid ?? null,
    eenheid: i.eenheid || '',
    naam: i.naam || '',
    productgroep: i.productgroep || 'overig',
    opmerking: i.opmerking || '',
  }));
  _formStaps = (data.stappen || []).map(s => ({
    id: maakId('fs'),
    tekst: s.tekst || '',
    timerMinuten: s.timerMinuten,
  }));
  if (!_formIngs.length) _formIngs = [leegIng()];
  if (!_formStaps.length) _formStaps = [leegStap()];
  // bronType wordt bewaard voor als we submiten
  _importBronType = bronType;
  _importBronUrl = bronType === 'link' ? document.getElementById('link-url').value.trim() : undefined;
  renderIngFormRijen();
  renderStapFormRijen();
  toonReceptStap('form');
}

function toonImportFout(tekst) {
  document.getElementById('import-fout-tekst').textContent = tekst;
  toonReceptStap('fout');
}

// ─── Boodschappen-tab ────────────────────────────────────────────────────────
function berekeningsBoodschappenSleutel(naam, eenheid) {
  return (naam.trim().toLowerCase() + '|' + eenheid.trim().toLowerCase());
}

function renderBoodschappenTab(g) {
  const container = document.getElementById('tab-boodschappen');
  if (!g || !g.recepten.length) {
    container.innerHTML = '<div class="tab-leeg">Nog geen ingrediënten. Voeg recepten toe om de lijst op te bouwen.</div>';
    return;
  }

  // Zorg dat afgevinkteIngredientKeys bestaat
  if (!g.afgevinkteIngredientKeys) g.afgevinkteIngredientKeys = [];
  const afgevinkt = new Set(g.afgevinkteIngredientKeys);

  // Samenvoegen: sleutel = productgroep + naam + eenheid
  const groepen = {}; // { productgroep: { sleutel: { naam, eenheid, hoeveelheid, productgroep } } }
  for (const r of g.recepten) {
    for (const ing of r.ingredienten) {
      const pgKey = ing.productgroep || 'overig';
      if (!groepen[pgKey]) groepen[pgKey] = {};
      const sleutel = berekeningsBoodschappenSleutel(ing.naam, ing.eenheid);
      const geschaaldH = ing.hoeveelheid !== null
        ? schaalHoeveelheid(ing.hoeveelheid, r.origineelAantalPersonen, r.geschaaldAantalPersonen, ing.eenheid)
        : null;
      if (groepen[pgKey][sleutel]) {
        // Samenvoegen
        const bestaand = groepen[pgKey][sleutel];
        if (geschaaldH !== null && bestaand.hoeveelheid !== null) {
          bestaand.hoeveelheid += geschaaldH;
        } else {
          bestaand.hoeveelheid = null; // kan niet optellen
        }
      } else {
        groepen[pgKey][sleutel] = {
          sleutel,
          naam: ing.naam,
          eenheid: ing.eenheid,
          hoeveelheid: geschaaldH,
          productgroep: pgKey,
        };
      }
    }
  }

  // Sorteer productgroepen op volgorde van PRODUCTGROEPEN
  const pgVolgorde = Object.keys(PRODUCTGROEPEN);
  const gesorteerdeGroepen = pgVolgorde.filter(pg => groepen[pg]);

  if (!gesorteerdeGroepen.length) {
    container.innerHTML = '<div class="tab-leeg">Geen ingrediënten gevonden.</div>';
    return;
  }

  let html = '<div style="padding:var(--gap)">';
  for (const pg of gesorteerdeGroepen) {
    const items = Object.values(groepen[pg]);
    html += `<div class="boodschappen-groep">
      <div class="boodschappen-groep-kop">${escHtml(PRODUCTGROEPEN[pg])}</div>`;
    for (const item of items) {
      const isAfgevinkt = afgevinkt.has(item.sleutel);
      const hoeveelheidTekst = item.hoeveelheid !== null
        ? (item.eenheid ? `${item.hoeveelheid}\u202f${item.eenheid} ` : `${item.hoeveelheid} `)
        : '';
      html += `<div class="boodschap-item${isAfgevinkt ? ' afgevinkt' : ''}" data-sleutel="${escHtml(item.sleutel)}">
        <div class="boodschap-cb"></div>
        <span class="boodschap-tekst">${escHtml(hoeveelheidTekst + item.naam)}</span>
      </div>`;
    }
    html += '</div>';
  }
  html += '<div class="boodschappen-reset"><button class="btn-secundair" id="btn-reset-boodschappen">Reset alle vinkjes</button></div>';
  html += '</div>';
  container.innerHTML = html;

  // Events: afvinken
  container.querySelectorAll('.boodschap-item').forEach(item => {
    item.addEventListener('click', async () => {
      const sleutel = item.dataset.sleutel;
      const set = new Set(g.afgevinkteIngredientKeys || []);
      if (set.has(sleutel)) set.delete(sleutel); else set.add(sleutel);
      g.afgevinkteIngredientKeys = [...set];
      try { await saveGelegenheid(g); } catch(e) {}
      item.classList.toggle('afgevinkt');
      const cb = item.querySelector('.boodschap-cb');
      if (cb) cb.style.background = item.classList.contains('afgevinkt') ? '' : '';
    });
  });

  // Reset-knop
  const resetBtn = document.getElementById('btn-reset-boodschappen');
  if (resetBtn) {
    resetBtn.addEventListener('click', async () => {
      g.afgevinkteIngredientKeys = [];
      try { await saveGelegenheid(g); } catch(e) {}
      renderBoodschappenTab(g);
    });
  }
}

// ─── Tijdlijn-tab ─────────────────────────────────────────────────────────────
function renderTijdlijnTab(g) {
  const container = document.getElementById('tab-tijdlijn');
  if (!g || !g.recepten.length) {
    container.innerHTML = '<div class="tab-leeg">De tijdlijn verschijnt zodra je recepten hebt toegevoegd.</div>';
    return;
  }

  // Groepeer recepten per tijdvenster
  const volgorde = ['week_vooruit', 'dag_ervoor', 'ochtend_van', 'laatste_uur', 'a_la_minute'];
  const groepen = {};
  for (const r of g.recepten) {
    const tv = r.tijdvenster || 'ochtend_van';
    if (!groepen[tv]) groepen[tv] = [];
    groepen[tv].push(r);
  }

  const gevulde = volgorde.filter(tv => groepen[tv] && groepen[tv].length);
  if (!gevulde.length) {
    container.innerHTML = '<div class="tab-leeg">De tijdlijn verschijnt zodra je recepten hebt toegevoegd.</div>';
    return;
  }

  let html = '<div style="padding:var(--gap)">';
  for (const tv of gevulde) {
    html += `<div class="tijdlijn-sectie">
      <div class="tijdlijn-sectie-kop">${escHtml(TIJDVENSTERS[tv])}</div>`;
    for (const r of groepen[tv]) {
      const eersteStap = r.stappen.length ? r.stappen[0].tekst : '';
      const preview = eersteStap ? eersteStap.substring(0, 80) + (eersteStap.length > 80 ? '…' : '') : '';
      html += `<div class="tijdlijn-recept" data-recept-id="${escHtml(r.id)}">
        <div class="tijdlijn-recept-body">
          <div class="tijdlijn-recept-naam">${escHtml(r.naam)}</div>
          ${preview ? `<div class="tijdlijn-recept-preview">${escHtml(preview)}</div>` : ''}
        </div>
        <div class="tijdlijn-chevron"><svg width="16" height="16"><use href="#ic-chevron-right"/></svg></div>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;

  // Navigeer naar recept bij klikken
  container.querySelectorAll('.tijdlijn-recept').forEach(el => {
    el.addEventListener('click', () => {
      state.actieveReceptId = el.dataset.receptId;
      wisselTab('recepten');
    });
  });
}

// ─── Recept-form ──────────────────────────────────────────────────────────────
let _formIngs = [];
let _formStaps = [];
let _bewerkenReceptId = null;
let _importBronType = 'handmatig';
let _importBronUrl = undefined;

const RECEPT_STAPPEN = ['methode', 'link', 'laden', 'fout', 'form'];
function toonReceptStap(naam) {
  RECEPT_STAPPEN.forEach(s => {
    const el = document.getElementById(`recept-stap-${s}`);
    if (el) el.style.display = s === naam ? '' : 'none';
  });
  const submitBtn = document.getElementById('btn-recept-submit');
  if (submitBtn) submitBtn.style.visibility = naam === 'form' ? 'visible' : 'hidden';
}

function leegIng() {
  return { id: maakId('fi'), hoeveelheid: null, eenheid: '', naam: '', productgroep: 'overig', opmerking: '' };
}
function leegStap() {
  return { id: maakId('fs'), tekst: '', timerMinuten: undefined };
}

// Bewaar huidige DOM-waarden terug in de arrays (zodat waarden niet verloren gaan bij re-render)
function saveIngState() {
  document.querySelectorAll('.ing-form-rij').forEach(rij => {
    const obj = _formIngs.find(i => i.id === rij.dataset.rowId);
    if (!obj) return;
    obj.hoeveelheid = parseFloat(rij.querySelector('.ing-hoeveelheid').value) || null;
    obj.eenheid = rij.querySelector('.ing-eenheid').value.trim();
    obj.naam = rij.querySelector('.ing-naam').value.trim();
    obj.productgroep = rij.querySelector('.ing-productgroep').value;
    obj.opmerking = rij.querySelector('.ing-opmerking').value.trim();
  });
}
function saveStapState() {
  document.querySelectorAll('.stap-form-rij').forEach(rij => {
    const obj = _formStaps.find(s => s.id === rij.dataset.rowId);
    if (!obj) return;
    obj.tekst = rij.querySelector('.stap-tekst').value;
    obj.timerMinuten = parseInt(rij.querySelector('.stap-timer').value) || undefined;
  });
}

function openReceptForm(receptId = null) {
  if (receptId instanceof Event) receptId = null;
  _bewerkenReceptId = receptId;
  _importBronType = 'handmatig';
  _importBronUrl = undefined;
  const g = actieveGelegenheid();

  if (receptId) {
    // Bewerken: sla methode-stap over, ga direct naar formulier
    const r = vindRecept(g, receptId);
    document.getElementById('rf-naam').value = r.naam;
    document.getElementById('rf-porties').value = r.origineelAantalPersonen;
    document.getElementById('rf-tijdvenster').value = r.tijdvenster;
    document.getElementById('rf-bereidingstijd').value = r.bereidingstijdMinuten || '';
    _formIngs = r.ingredienten.length ? r.ingredienten.map(i => ({ ...i })) : [leegIng()];
    _formStaps = r.stappen.length ? r.stappen.map(s => ({ ...s })) : [leegStap()];
    _importBronType = r.bronType;
    _importBronUrl = r.bronUrl;
    document.getElementById('recept-form-titel').textContent = 'Recept bewerken';
    renderIngFormRijen();
    renderStapFormRijen();
    toonReceptStap('form');
  } else {
    // Nieuw recept: toon methode-selectie
    document.getElementById('recept-form-titel').textContent = 'Recept toevoegen';
    document.getElementById('link-url').value = '';
    toonReceptStap('methode');
  }

  document.getElementById('modaal-recept').classList.add('actief');
  window.scrollTo(0, 0);
}

function sluitReceptForm() {
  document.getElementById('modaal-recept').classList.remove('actief');
}

function renderIngFormRijen() {
  const c = document.getElementById('ing-form-container');
  c.innerHTML = _formIngs.map((ing) => {
    const pgOpties = Object.entries(PRODUCTGROEPEN).map(([k, v]) =>
      `<option value="${k}"${k === (ing.productgroep || 'overig') ? ' selected' : ''}>${v}</option>`).join('');
    return `
    <div class="ing-form-rij" data-row-id="${ing.id}">
      <div class="ing-form-top">
        <input type="number" class="form-inp inp-hoeveelheid ing-hoeveelheid"
               value="${ing.hoeveelheid != null ? ing.hoeveelheid : ''}" placeholder="Hoev." min="0" step="any">
        <input type="text" class="form-inp inp-eenheid ing-eenheid"
               value="${escHtml(ing.eenheid || '')}" placeholder="Eenh.">
        <input type="text" class="form-inp inp-naam ing-naam"
               value="${escHtml(ing.naam || '')}" placeholder="Naam ingrediënt" required>
        <button type="button" class="btn-rij-del" data-row-id="${ing.id}" title="Verwijder">×</button>
      </div>
      <div class="ing-form-bot">
        <select class="form-inp inp-productgroep ing-productgroep">${pgOpties}</select>
        <input type="text" class="form-inp inp-opmerking ing-opmerking"
               value="${escHtml(ing.opmerking || '')}" placeholder="Opmerking (opt.)">
      </div>
    </div>`;
  }).join('');

  c.querySelectorAll('.btn-rij-del').forEach(btn => {
    btn.addEventListener('click', () => {
      saveIngState();
      if (_formIngs.length <= 1) return;
      _formIngs = _formIngs.filter(i => i.id !== btn.dataset.rowId);
      renderIngFormRijen();
    });
  });
}

function renderStapFormRijen() {
  const c = document.getElementById('stap-form-container');
  c.innerHTML = _formStaps.map((stap, idx) => `
    <div class="stap-form-rij" data-row-id="${stap.id}">
      <div class="stap-form-nr">${idx + 1}</div>
      <div class="stap-form-body">
        <textarea class="stap-form-textarea stap-tekst" placeholder="Omschrijving van de stap…" rows="2">${escHtml(stap.tekst || '')}</textarea>
        <div class="stap-form-timer">
          <label>Timer:</label>
          <input type="number" class="form-inp inp-timer stap-timer"
                 value="${stap.timerMinuten || ''}" placeholder="min" min="1">
          <span>min (optioneel)</span>
        </div>
      </div>
      <button type="button" class="btn-rij-del" data-row-id="${stap.id}" title="Verwijder">×</button>
    </div>`).join('');

  c.querySelectorAll('.btn-rij-del').forEach(btn => {
    btn.addEventListener('click', () => {
      saveStapState();
      if (_formStaps.length <= 1) return;
      _formStaps = _formStaps.filter(s => s.id !== btn.dataset.rowId);
      renderStapFormRijen();
    });
  });
}

function leesIngredientRijen() {
  return Array.from(document.querySelectorAll('.ing-form-rij')).map(rij => ({
    id: maakId('ing'),
    hoeveelheid: parseFloat(rij.querySelector('.ing-hoeveelheid').value) || null,
    eenheid: rij.querySelector('.ing-eenheid').value.trim(),
    naam: rij.querySelector('.ing-naam').value.trim(),
    productgroep: rij.querySelector('.ing-productgroep').value,
    opmerking: rij.querySelector('.ing-opmerking').value.trim() || undefined,
  })).filter(i => i.naam);
}

function leesStapRijen() {
  return Array.from(document.querySelectorAll('.stap-form-rij')).map((rij, idx) => ({
    id: maakId('stap'),
    nummer: idx + 1,
    tekst: rij.querySelector('.stap-tekst').value.trim(),
    timerMinuten: parseInt(rij.querySelector('.stap-timer').value) || undefined,
  })).filter(s => s.tekst);
}

async function submitReceptHandmatig(e) {
  e.preventDefault();
  const naam = document.getElementById('rf-naam').value.trim();
  if (!naam) { document.getElementById('rf-naam').focus(); return; }

  const porties = parseInt(document.getElementById('rf-porties').value, 10) || 1;
  const tijdvenster = document.getElementById('rf-tijdvenster').value;
  const btRaw = document.getElementById('rf-bereidingstijd').value;
  const ingredienten = leesIngredientRijen();
  const stappen = leesStapRijen();
  const g = actieveGelegenheid();

  if (_bewerkenReceptId) {
    // Bewerken: bestaand recept updaten
    const r = vindRecept(g, _bewerkenReceptId);
    if (!r) return;
    const backup = { ...r, ingredienten: [...r.ingredienten], stappen: [...r.stappen] };
    r.naam = naam;
    r.origineelAantalPersonen = porties;
    r.tijdvenster = tijdvenster;
    r.bereidingstijdMinuten = btRaw ? parseInt(btRaw, 10) : undefined;
    r.ingredienten = ingredienten;
    r.stappen = stappen;
    try {
      await saveGelegenheid(g);
      sluitReceptForm();
      renderReceptenTab(g);
      wisselRecept(_bewerkenReceptId);
      renderOverzichtTab(g);
    } catch (err) {
      Object.assign(r, backup);
      alert(STRINGS.opslagFout);
    }
  } else {
    // Nieuw recept aanmaken
    const recept = {
      id: maakId('recept'),
      naam,
      bronType: _importBronType || 'handmatig',
      bronUrl: _importBronUrl,
      origineelAantalPersonen: porties,
      geschaaldAantalPersonen: porties,
      bereidingstijdMinuten: btRaw ? parseInt(btRaw, 10) : undefined,
      tijdvenster,
      ingredienten,
      stappen,
      aangemaakt: new Date().toISOString(),
    };
    voegReceptToe(g, recept);
    try {
      await saveGelegenheid(g);
      sluitReceptForm();
      state.actieveReceptId = recept.id;
      wisselTab('recepten');
    } catch (err) {
      verwijderRecept(g, recept.id);
      alert(STRINGS.opslagFout);
    }
  }
}

// ─── Gelegenheid aanmaken / bewerken ─────────────────────────────────────────
function openModaalNieuweGeleg() {
  state.modaalModus = 'aanmaken';
  document.getElementById('modaal-geleg-titel').textContent = 'Nieuwe gelegenheid';
  document.getElementById('btn-submit-geleg').textContent = 'Aanmaken';
  document.getElementById('f-naam').value = '';
  document.getElementById('f-datum').value = '';
  document.getElementById('f-tijd').value = '12:00';
  document.getElementById('f-personen').value = '4';
  document.getElementById('modaal-geleg').classList.add('actief');
  setTimeout(() => document.getElementById('f-naam').focus(), 50);
}

function openModaalBewerkGeleg() {
  const g = actieveGelegenheid();
  if (!g) return;
  state.modaalModus = 'bewerken';
  document.getElementById('modaal-geleg-titel').textContent = 'Gelegenheid bewerken';
  document.getElementById('btn-submit-geleg').textContent = 'Opslaan';
  document.getElementById('f-naam').value = g.naam;
  document.getElementById('f-datum').value = g.datum || '';
  document.getElementById('f-tijd').value = g.serveerTijd;
  document.getElementById('f-personen').value = g.aantalPersonen;
  document.getElementById('modaal-geleg').classList.add('actief');
  setTimeout(() => document.getElementById('f-naam').focus(), 50);
}

function sluitModaalGeleg() {
  document.getElementById('modaal-geleg').classList.remove('actief');
}

async function submitGelegForm(e) {
  e.preventDefault();
  const naam = document.getElementById('f-naam').value.trim();
  const datum = document.getElementById('f-datum').value;
  const tijd = document.getElementById('f-tijd').value;
  const personen = parseInt(document.getElementById('f-personen').value, 10);
  if (!naam || !tijd || !personen) return;

  if (state.modaalModus === 'aanmaken') {
    const nu = new Date().toISOString();
    const g = { id: maakId('geleg'), naam, datum, serveerTijd: tijd, aantalPersonen: personen, recepten: [], aangemaakt: nu, gewijzigd: nu };
    try {
      await saveGelegenheid(g);
      state.gelegenheden.push(g);
      sorteerGelegenheden(state.gelegenheden);
      sluitModaalGeleg();
      openGelegenheid(g.id);
    } catch (err) { alert(STRINGS.opslagFout); }
  } else {
    const g = actieveGelegenheid();
    if (!g) return;
    Object.assign(g, { naam, datum, serveerTijd: tijd, aantalPersonen: personen });
    try {
      await saveGelegenheid(g);
      sorteerGelegenheden(state.gelegenheden);
      sluitModaalGeleg();
      renderGelegenheidHeader();
    } catch (err) { alert(STRINGS.opslagFout); }
  }
}

async function bevestigVerwijderGelegenheid(id) {
  const g = state.gelegenheden.find(g => g.id === id);
  if (!g || !confirm(STRINGS.verwijderGelegBevestiging(g.naam))) return;
  try {
    await deleteGelegenheid(id);
    state.gelegenheden = state.gelegenheden.filter(g => g.id !== id);
    renderStartscherm();
  } catch (e) { alert(STRINGS.opslagFout); }
}

// ─── Hulpfuncties ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // Startscherm
  document.getElementById('btn-nieuwe-geleg').addEventListener('click', openModaalNieuweGeleg);

  // Gelegenheid
  document.getElementById('btn-terug-start').addEventListener('click', naarStartscherm);
  document.getElementById('btn-bewerk-geleg').addEventListener('click', openModaalBewerkGeleg);
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => wisselTab(t.dataset.tab)));

  // Gelegenheid-modaal
  document.getElementById('btn-annuleer-geleg').addEventListener('click', sluitModaalGeleg);
  document.getElementById('modaal-geleg').addEventListener('click', (e) => { if (e.target === e.currentTarget) sluitModaalGeleg(); });
  document.getElementById('form-geleg').addEventListener('submit', submitGelegForm);

  // Recept-form: methode-selectie
  document.getElementById('btn-methode-handmatig').addEventListener('click', () => {
    _formIngs = [leegIng()]; _formStaps = [leegStap()];
    document.getElementById('rf-naam').value = '';
    document.getElementById('rf-porties').value = actieveGelegenheid()?.aantalPersonen || 4;
    document.getElementById('rf-tijdvenster').value = 'ochtend_van';
    document.getElementById('rf-bereidingstijd').value = '';
    renderIngFormRijen(); renderStapFormRijen();
    toonReceptStap('form');
    setTimeout(() => document.getElementById('rf-naam').focus(), 50);
  });

  const fotoInput = document.getElementById('foto-input');
  document.getElementById('btn-methode-foto').addEventListener('click', () => fotoInput.click());
  fotoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (file) importeerFoto(file);
  });

  document.getElementById('btn-methode-link').addEventListener('click', () => toonReceptStap('link'));
  document.getElementById('btn-link-terug').addEventListener('click', () => toonReceptStap('methode'));
  document.getElementById('btn-importeer-link').addEventListener('click', () => {
    const url = document.getElementById('link-url').value.trim();
    if (!url) { document.getElementById('link-url').focus(); return; }
    importeerLink(url);
  });
  document.getElementById('link-url').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-importeer-link').click(); }
  });

  document.getElementById('btn-fout-handmatig').addEventListener('click', () => {
    _formIngs = [leegIng()]; _formStaps = [leegStap()];
    renderIngFormRijen(); renderStapFormRijen();
    toonReceptStap('form');
  });

  // Recept-form
  document.getElementById('btn-annuleer-recept').addEventListener('click', sluitReceptForm);
  document.getElementById('btn-voeg-ing-toe').addEventListener('click', () => {
    saveIngState();
    _formIngs.push(leegIng());
    renderIngFormRijen();
    setTimeout(() => { const l = document.querySelectorAll('.ing-naam'); if (l.length) l[l.length-1].focus(); }, 30);
  });
  document.getElementById('btn-voeg-stap-toe').addEventListener('click', () => {
    saveStapState();
    _formStaps.push(leegStap());
    renderStapFormRijen();
    setTimeout(() => { const l = document.querySelectorAll('.stap-tekst'); if (l.length) l[l.length-1].focus(); }, 30);
  });
  document.getElementById('form-recept').addEventListener('submit', submitReceptHandmatig);

  // Cook Mode
  document.getElementById('btn-cook-sluiten').addEventListener('click', sluitCookMode);

  // Data laden
  state.gelegenheden = await loadAllGelegenheden();
  renderStartscherm();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
