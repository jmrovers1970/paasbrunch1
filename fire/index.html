const API_URL = 'https://api.anthropic.com/v1/messages';
const API_HEADERS = {
  'content-type': 'application/json',
  'anthropic-version': '2023-06-01',
  'anthropic-dangerous-direct-browser-access': 'true',
};

async function roepApiAan(messages, timeout = 30000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: API_HEADERS,
      signal: controller.signal,
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4096, messages }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `API-fout ${resp.status}`);
    }
    const data = await resp.json();
    return data.content[0].text;
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('Het ophalen duurde te lang. Probeer opnieuw of voer het handmatig in.');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

async function comprimeerFoto(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const max = 1280;
      let { width: w, height: h } = img;
      if (w > max || h > max) {
        if (w >= h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        if (!blob) { reject(new Error('Compressie mislukt')); return; }
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.8);
    };
    img.onerror = reject;
    img.src = url;
  });
}

async function importeerFoto(file) {
  toonReceptStap('laden');
  document.getElementById('laden-tekst').textContent = 'Foto wordt uitgelezen…';
  try {
    const base64 = await comprimeerFoto(file);
    const tekst = await roepApiAan([{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
        { type: 'text', text: EXTRACTIE_PROMPT },
      ],
    }]);
    verwerkImportResultaat(tekst, 'foto');
  } catch (e) {
    const msg = e.message || '';
    if (msg.toLowerCase().includes('api-key') || msg.includes('401')) {
      toonImportFout('Foto-import werkt alleen in de Claude Artifact-omgeving. Voer het recept handmatig in.');
    } else {
      toonImportFout(msg || 'Kon het recept niet uitlezen. Probeer een andere foto of voer het handmatig in.');
    }
  }
}

async function importeerLink(url) {
  toonReceptStap('laden');
  document.getElementById('laden-tekst').textContent = 'Recept wordt opgehaald…';

  if (!window.claude?.complete) {
    toonImportFout('Link-import werkt alleen in de Claude Artifact-omgeving. Voer het recept handmatig in.');
    return;
  }

  const prompt = `${EXTRACTIE_PROMPT}\n\nHaal het recept op van deze URL en extraheer het: ${url}`;
  try {
    const tekst = await window.claude.complete(prompt);
    verwerkImportResultaat(tekst, 'link');
  } catch (e) {
    toonImportFout(e.message || 'Kon het recept niet ophalen. Controleer de URL of voer het handmatig in.');
  }
}

function verwerkImportResultaat(jsonTekst, bronType) {
  // Strip eventuele code block markers
  const schoon = jsonTekst.replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/,'').trim();
  let data;
  try { data = JSON.parse(schoon); }
  catch (e) {
    toonImportFout('Het recept kon niet worden uitgelezen. Probeer een andere foto of voer het handmatig in.');
    return;
  }
  if (data.fout) {
    toonImportFout(`Geen recept herkend: ${data.reden || 'onbekende reden'}. Voer het handmatig in.`);
    return;
  }
  // Formulier vullen met geëxtraheerde data
  document.getElementById('rf-naam').value = data.naam || '';
  document.getElementById('rf-porties').value = data.origineelAantalPersonen || actieveGelegenheid()?.aantalPersonen || 4;
  document.getElementById('rf-tijdvenster').value = data.tijdvenster || 'ochtend_van';
  document.getElementById('rf-bereidingstijd').value = data.bereidingstijdMinuten || '';
  _importBronType = bronType;
  _importBronUrl = bronType === 'link' ? document.getElementById('link-url').value.trim() : undefined;

  if (data.componenten && data.componenten.length) {
    _formComponentenModus = true;
    _formComponenten = data.componenten.map(comp => ({
      id: maakId('comp'),
      naam: comp.naam || 'Component',
      tijdvenster: comp.tijdvenster || data.tijdvenster || 'ochtend_van',
      ings: (comp.ingredienten || []).map(i => ({
        id: maakId('fi'),
        hoeveelheid: i.hoeveelheid ?? null,
        eenheid: i.eenheid || '',
        naam: i.naam || '',
        productgroep: i.productgroep || 'overig',
        opmerking: i.opmerking || '',
      })),
      staps: (comp.stappen || []).map(s => ({
        id: maakId('fs'),
        tekst: s.tekst || '',
        timerMinuten: s.timerMinuten,
        tijdvenster: s.tijdvenster || undefined,
      })),
    }));
    _formComponenten.forEach(c => {
      if (!c.ings.length) c.ings = [leegIng()];
      if (!c.staps.length) c.staps = [leegStap()];
    });
    _formIngs = [leegIng()];
    _formStaps = [leegStap()];
  } else {
    _formComponentenModus = false;
    _formComponenten = [];
    _formIngs = (data.ingredienten || []).map(i => ({
      id: maakId('fi'),
      hoeveelheid: i.hoeveelheid ?? null,
      eenheid: i.eenheid || '',
      naam: i.naam || '',
      productgroep: i.productgroep || 'overig',
      opmerking: i.opmerking || '',
    }));
    _formStaps = (data.stappen || []).map(s => ({
      id: maakId('fs'),
      tekst: s.tekst || '',
      timerMinuten: s.timerMinuten,
      tijdvenster: s.tijdvenster || undefined,
    }));
    if (!_formIngs.length) _formIngs = [leegIng()];
    if (!_formStaps.length) _formStaps = [leegStap()];
    renderIngFormRijen();
    renderStapFormRijen();
  }
  initReceptFormModus();
  toonReceptStap('form');
}

function toonImportFout(tekst) {
  document.getElementById('import-fout-tekst').textContent = tekst;
  toonReceptStap('fout');
}

// ─── Boodschappen-tab ────────────────────────────────────────────────────────
function berekeningsBoodschappenSleutel(naam, eenheid) {
  return (naam.trim().toLowerCase() + '|' + eenheid.trim().toLowerCase());
}

function renderBoodschappenTab(g) {
  const container = document.getElementById('tab-boodschappen');
  if (!g || !g.recepten.length) {
    container.innerHTML = '<div class="tab-leeg">Nog geen ingrediënten. Voeg recepten toe om de lijst op te bouwen.</div>';
    return;
  }

  // Zorg dat afgevinkteIngredientKeys bestaat
  if (!g.afgevinkteIngredientKeys) g.afgevinkteIngredientKeys = [];
  const afgevinkt = new Set(g.afgevinkteIngredientKeys);

  // Samenvoegen: sleutel = productgroep + naam + eenheid
  const groepen = {}; // { productgroep: { sleutel: { naam, eenheid, hoeveelheid, productgroep } } }
  for (const r of g.recepten) {
    const alleIngs = r.componenten && r.componenten.length
      ? r.componenten.flatMap(c => c.ingredienten)
      : r.ingredienten;
    for (const ing of alleIngs) {
      const pgKey = ing.productgroep || 'overig';
      if (!groepen[pgKey]) groepen[pgKey] = {};
      const sleutel = berekeningsBoodschappenSleutel(ing.naam, ing.eenheid);
      const geschaaldH = ing.hoeveelheid !== null
        ? schaalHoeveelheid(ing.hoeveelheid, r.origineelAantalPersonen, r.geschaaldAantalPersonen, ing.eenheid)
        : null;
      if (groepen[pgKey][sleutel]) {
        // Samenvoegen
        const bestaand = groepen[pgKey][sleutel];
        if (geschaaldH !== null && bestaand.hoeveelheid !== null) {
          bestaand.hoeveelheid += geschaaldH;
        } else {
          bestaand.hoeveelheid = null; // kan niet optellen
        }
      } else {
        groepen[pgKey][sleutel] = {
          sleutel,
          naam: ing.naam,
          eenheid: ing.eenheid,
          hoeveelheid: geschaaldH,
          productgroep: pgKey,
        };
      }
    }
  }

  // Sorteer productgroepen op volgorde van PRODUCTGROEPEN
  const pgVolgorde = Object.keys(PRODUCTGROEPEN);
  const gesorteerdeGroepen = pgVolgorde.filter(pg => groepen[pg]);

  if (!gesorteerdeGroepen.length) {
    container.innerHTML = '<div class="tab-leeg">Geen ingrediënten gevonden.</div>';
    return;
  }

  function maakBoodschapHtml(item, isAfgevinkt) {
    const hoeveelheidTekst = item.hoeveelheid !== null
      ? (item.eenheid ? `${item.hoeveelheid}\u202f${item.eenheid} ` : `${item.hoeveelheid} `)
      : '';
    return `<div class="boodschap-item${isAfgevinkt ? ' afgevinkt' : ''}" data-sleutel="${escHtml(item.sleutel)}">
      <div class="boodschap-cb"></div>
      <span class="boodschap-tekst">${escHtml(hoeveelheidTekst + item.naam)}</span>
    </div>`;
  }

  // Verzamel alle items plat voor "In huis"-sectie
  const alleItems = gesorteerdeGroepen.flatMap(pg => Object.values(groepen[pg]));
  const inHuisItems = alleItems.filter(item => afgevinkt.has(item.sleutel));

  let html = '<div style="padding:var(--gap)">';

  // Actieve items per productgroep (sla groepen over die volledig afgevinkt zijn)
  for (const pg of gesorteerdeGroepen) {
    const items = Object.values(groepen[pg]).filter(item => !afgevinkt.has(item.sleutel));
    if (!items.length) continue;
    html += `<div class="boodschappen-groep">
      <div class="boodschappen-groep-kop">${escHtml(PRODUCTGROEPEN[pg])}</div>`;
    for (const item of items) html += maakBoodschapHtml(item, false);
    html += '</div>';
  }

  // "In huis" sectie voor afgevinkte items
  if (inHuisItems.length) {
    html += '<div class="in-huis-sectie"><div class="in-huis-kop">In huis</div>';
    for (const item of inHuisItems) html += maakBoodschapHtml(item, true);
    html += '</div>';
  }

  html += '<div class="boodschappen-reset"><button class="btn-secundair" id="btn-reset-boodschappen">Reset alle vinkjes</button></div>';
  html += '</div>';
  container.innerHTML = html;

  // Events: afvinken — her-render zodat item naar correcte sectie verplaatst
  container.querySelectorAll('.boodschap-item').forEach(item => {
    item.addEventListener('click', async () => {
      const sleutel = item.dataset.sleutel;
      const set = new Set(g.afgevinkteIngredientKeys || []);
      if (set.has(sleutel)) set.delete(sleutel); else set.add(sleutel);
      g.afgevinkteIngredientKeys = [...set];
      try { await saveGelegenheid(g); } catch(e) {}
      renderBoodschappenTab(g);
    });
  });

  // Reset-knop
  const resetBtn = document.getElementById('btn-reset-boodschappen');
  if (resetBtn) {
    resetBtn.addEventListener('click', async () => {
      g.afgevinkteIngredientKeys = [];
      try { await saveGelegenheid(g); } catch(e) {}
      renderBoodschappenTab(g);
    });
  }
}

// ─── Tijdlijn: bouw handelingen op ───────────────────────────────────────────
// Eén item per component (recept met componenten) of per recept (zonder componenten).
// item.id = comp.id of r.id — gebruikt als sleutel in tijdlijnVolgorde.
function buildTijdlijn(g) {
  const items = [];
  for (const r of g.recepten) {
    if (r.componenten && r.componenten.length) {
      for (const comp of r.componenten) {
        items.push({
          id:          comp.id,
          tijdvenster: comp.tijdvenster || r.tijdvenster || 'ochtend_van',
          naam:        comp.naam || 'Component',
          receptNaam:  r.naam,
          receptId:    r.id,
          compId:      comp.id,
          isComp:      true,
        });
      }
    } else {
      items.push({
        id:          r.id,
        tijdvenster: r.tijdvenster || 'ochtend_van',
        naam:        r.naam,
        receptNaam:  r.naam,
        receptId:    r.id,
        compId:      null,
        isComp:      false,
      });
    }
  }

  // Groepeer per tijdvenster in TV_VOLGORDE-volgorde
  const gegroepeerd = {};
  for (const tv of TV_VOLGORDE) {
    const groep = items.filter(i => i.tijdvenster === tv);
    if (groep.length) gegroepeerd[tv] = [...groep];
  }

  // Pas opgeslagen volgorde per groep toe (item.id als sleutel)
  if (g.tijdlijnVolgorde) {
    for (const tv of TV_VOLGORDE) {
      if (!gegroepeerd[tv]) continue;
      const custom = g.tijdlijnVolgorde[tv];
      if (!custom || !custom.length) continue;
      gegroepeerd[tv].sort((a, b) => {
        const ia = custom.indexOf(a.id);
        const ib = custom.indexOf(b.id);
        if (ia === -1 && ib === -1) return 0;
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
      });
    }
  }

  const gevulde   = TV_VOLGORDE.filter(tv => gegroepeerd[tv]);
  const alleItems = gevulde.flatMap(tv => gegroepeerd[tv]);
  return { gegroepeerd, gevulde, alleItems };
}

// Helper: update tijdvenster van een tijdlijn-item in de receptdata
function updateItemTijdvenster(g, item, nieuwTv) {
  const r = g.recepten.find(r => r.id === item.receptId);
  if (!r) return;
  if (item.isComp) {
    const comp = (r.componenten || []).find(c => c.id === item.compId);
    if (comp) comp.tijdvenster = nieuwTv;
  } else {
    r.tijdvenster = nieuwTv;
  }
}

// ─── Tijdlijn-tab ─────────────────────────────────────────────────────────────
function renderTijdlijnTab(g) {
  const container = document.getElementById('tab-tijdlijn');
  if (!g || !g.recepten.length) {
    container.innerHTML = '<div class="tab-leeg">De tijdlijn verschijnt zodra je recepten hebt toegevoegd.</div>';
    return;
  }

  const { gegroepeerd, gevulde, alleItems } = buildTijdlijn(g);

  if (!gevulde.length) {
    container.innerHTML = '<div class="tab-leeg">Voeg recepten toe om de tijdlijn te vullen.</div>';
    return;
  }

  const PIJL_OP   = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
  const PIJL_NEER = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

  const totaal = alleItems.length;
  let gIdx = 0;
  let html = '<div style="padding:var(--gap)">';

  for (const tv of gevulde) {
    const tvKleur = `var(--tv-${TV_CSS_KLEUR[tv] || 'ochtend'})`;
    html += `<div class="tijdlijn-sectie" style="border-left:3px solid ${tvKleur};padding-left:10px">
      <div class="tijdlijn-sectie-kop" style="color:${tvKleur}">${escHtml(TIJDVENSTERS[tv] || tv)}</div>`;
    for (const h of gegroepeerd[tv]) {
      const isEerste  = gIdx === 0;
      const isLaatste = gIdx === totaal - 1;
      html += `<div class="tijdlijn-handeling" data-recept-id="${escHtml(h.receptId)}" data-global-idx="${gIdx}">
        <div class="tl-item-body">
          <span class="tl-stap-tekst">${escHtml(h.naam)}</span>
          ${h.isComp ? `<span class="tl-recept-naam">${escHtml(h.receptNaam)}</span>` : ''}
        </div>
        <div class="tl-pijlen">
          <button class="tl-pijl-btn" data-global-idx="${gIdx}" data-dir="op"   ${isEerste  ? 'disabled' : ''} title="Omhoog">${PIJL_OP}</button>
          <button class="tl-pijl-btn" data-global-idx="${gIdx}" data-dir="neer" ${isLaatste ? 'disabled' : ''} title="Omlaag">${PIJL_NEER}</button>
        </div>
      </div>`;
      gIdx++;
    }
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;

  // Klik op item → navigeer naar recept (pijltjes stoppen propagatie)
  container.querySelectorAll('.tijdlijn-handeling').forEach(el => {
    el.addEventListener('click', () => {
      state.actieveReceptId = el.dataset.receptId;
      wisselTab('recepten');
    });
  });

  // Pijltjes ↑↓: wissel volgorde, cross-group bijwerken tijdvenster
  container.querySelectorAll('.tl-pijl-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (btn.disabled) return;

      const vanIdx  = parseInt(btn.dataset.globalIdx, 10);
      const dir     = btn.dataset.dir;
      const naarIdx = dir === 'op' ? vanIdx - 1 : vanIdx + 1;

      const gAct = actieveGelegenheid();
      if (!gAct) return;

      const { gegroepeerd: grp, alleItems: ai } = buildTijdlijn(gAct);
      if (naarIdx < 0 || naarIdx >= ai.length) return;

      const itemA = ai[vanIdx];
      const itemB = ai[naarIdx];

      if (!gAct.tijdlijnVolgorde) gAct.tijdlijnVolgorde = {};

      if (itemA.tijdvenster === itemB.tijdvenster) {
        // Binnen dezelfde groep: simpele wissel in volgorde-array
        const tv  = itemA.tijdvenster;
        const ids = grp[tv].map(i => i.id);
        const ia  = ids.indexOf(itemA.id);
        const ib  = ids.indexOf(itemB.id);
        [ids[ia], ids[ib]] = [ids[ib], ids[ia]];
        gAct.tijdlijnVolgorde[tv] = ids;
      } else {
        // Cross-groep: items wisselen van tijdvenster
        const tvA = itemA.tijdvenster;
        const tvB = itemB.tijdvenster;
        const idsA = grp[tvA].map(i => i.id);
        const idsB = grp[tvB].map(i => i.id);
        const posA = idsA.indexOf(itemA.id);
        const posB = idsB.indexOf(itemB.id);
        // Vervang itemA in groep tvA door itemB, en andersom
        idsA.splice(posA, 1, itemB.id);
        idsB.splice(posB, 1, itemA.id);
        gAct.tijdlijnVolgorde[tvA] = idsA;
        gAct.tijdlijnVolgorde[tvB] = idsB;
        // Update tijdvenster in receptdata (werkt door in component-badge en detailpagina)
        updateItemTijdvenster(gAct, itemA, tvB);
        updateItemTijdvenster(gAct, itemB, tvA);
      }

      try {
        await saveGelegenheid(gAct);
      } catch (err) {
        console.warn('[Fire] tijdlijn volgorde opslaan mislukt:', err);
      }
      renderTijdlijnTab(gAct);
    });
  });
}

// ─── Serveermoment-form state ─────────────────────────────────────────────────
let _formServeermomenten = [];
let _verwijderdeServeermomentIds = [];

function saveServeermomentState() {
  document.querySelectorAll('.serveerm-rij').forEach(rij => {
    const sm = _formServeermomenten.find(s => s.id === rij.dataset.id);
    if (!sm) return;
    sm.naam = rij.querySelector('.serveerm-naam').value.trim() || 'Serveren';
    sm.tijdstip = rij.querySelector('.serveerm-tijdstip').value || '12:00';
  });
}

function renderServeermomentRijen() {
  const c = document.getElementById('serveerm-container');
  if (!c) return;
  const enkelvoudig = _formServeermomenten.length <= 1;
  c.innerHTML = _formServeermomenten.map(sm => `
    <div class="serveerm-rij" data-id="${sm.id}">
      <input type="text" class="form-inp inp-serveerm-naam serveerm-naam"
             value="${escHtml(sm.naam)}" placeholder="Naam moment" maxlength="40">
      <input type="time" class="form-inp inp-serveerm-tijd serveerm-tijdstip"
             value="${sm.tijdstip}">
      <button type="button" class="btn-rij-del serveerm-del" data-id="${sm.id}"
              ${enkelvoudig ? 'disabled' : ''}>×</button>
    </div>`).join('');
  c.querySelectorAll('.serveerm-del:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => verwijderServeermomentRij(btn.dataset.id));
  });
}

function verwijderServeermomentRij(id) {
  if (_formServeermomenten.length <= 1) return;
  saveServeermomentState();
  const g = actieveGelegenheid();
  const eersteAnder = _formServeermomenten.find(sm => sm.id !== id);
  if (g) {
    const n = g.recepten.filter(r => r.serveermomentId === id).length;
    if (n > 0) {
      const naam = eersteAnder ? `"${eersteAnder.naam}"` : 'het eerste moment';
      if (!confirm(`${n} recept${n > 1 ? 'en' : ''} worden verplaatst naar ${naam}. Doorgaan?`)) return;
    }
  }
  _verwijderdeServeermomentIds.push(id);
  _formServeermomenten = _formServeermomenten.filter(sm => sm.id !== id);
  _formServeermomenten.forEach((sm, i) => { sm.volgorde = i + 1; });
  renderServeermomentRijen();
}

// ─── Recept-form ──────────────────────────────────────────────────────────────
let _formIngs = [];
let _formStaps = [];
let _bewerkenReceptId = null;
let _importBronType = 'handmatig';
let _importBronUrl = undefined;

function leegComp() {
  return {
    id: maakId('comp'),

    ings: [leegIng()],

  const isComp = _formComponentenModus;

  c.innerHTML = _formComponenten.map(comp => {

               value="${escHtml(comp.naam)}" placeholder="Naam component (bijv. Bodem)">
        <select class="form-inp comp-blok-tv comp-tv">${tvOpts}</select>
        ${_formComponenten.length > 1
          ? `<button type="button" class="btn-rij-del comp-del" data-comp-id="${comp.id}">×</button>`
          : `<div style="width:26px;flex-shrink:0"></div>`}
      </div>
      <div class="comp-sectie-kop">Ingrediënten</div>
      <div id="ing-comp-${comp.id}"></div>
      <button type="button" class="btn-toevoegen comp-voeg-ing" data-comp-id="${comp.id}" style="margin-bottom:4px">
        <svg width="12" height="12"><use href="#ic-plus"/></svg> Ingrediënt toevoegen
      </button>

      </button>
    </div>`;
  }).join('');

  // Render ings en staps per component
  _formComponenten.forEach(comp => {
    renderCompIngRijen(comp);
    renderCompStapRijen(comp);
  });

  // Delete-knoppen component
  c.querySelectorAll('.comp-del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (_formComponenten.length <= 1) return;
      saveComponentenState();
      _formComponenten = _formComponenten.filter(co => co.id !== btn.dataset.compId);
      renderComponenten();
    });
  });

  // Toevoeg-knoppen ings/staps per component
  c.querySelectorAll('.comp-voeg-ing').forEach(btn => {
    btn.addEventListener('click', () => {
      const comp = _formComponenten.find(co => co.id === btn.dataset.compId);
      if (!comp) return;
      saveCompIngState(comp);
      comp.ings.push(leegIng());
      renderCompIngRijen(comp);
    });
  });
  c.querySelectorAll('.comp-voeg-stap').forEach(btn => {
    btn.addEventListener('click', () => {
      const comp = _formComponenten.find(co => co.id === btn.dataset.compId);
      if (!comp) return;
      saveCompStapState(comp);
      comp.staps.push(leegStap());
      renderCompStapRijen(comp);
    });
  });

  // Herregistreer "Component toevoegen"-knop zodat hij altijd up-to-date is
  const btnVoegCompToe = document.getElementById('btn-voeg-comp-toe');
  if (btnVoegCompToe) {
    btnVoegCompToe.onclick = () => {
      if (!_formComponentenModus) return;
      saveComponentenState();
      _formComponenten.push(leegComp());
      renderComponenten();
    };
  }
}

function vulServeermomentDropdown(huidigServeermomentId) {
  const g = actieveGelegenheid();
  const rij = document.getElementById('rf-serveermoment-rij');
  const sel = document.getElementById('rf-serveermoment');
  if (!g || !rij || !sel) return;
  const sms = [...(g.serveermomenten || [])].sort((a, b) => a.tijdstip.localeCompare(b.tijdstip));
  if (sms.length <= 1) {
    rij.style.display = 'none';
    return;
  }
  rij.style.display = '';
  sel.innerHTML = sms.map(sm =>
    `<option value="${sm.id}"${sm.id === huidigServeermomentId ? ' selected' : ''}>${sm.tijdstip} — ${escHtml(sm.naam)}</option>`
  ).join('');
}

function defaultServeermomentId() {
  const g = actieveGelegenheid();
  if (!g) return null;
  const sms = [...(g.serveermomenten || [])].sort((a, b) => a.tijdstip.localeCompare(b.tijdstip));
  return sms[0]?.id || null;
}

function openReceptForm(receptId = null) {
  if (receptId instanceof Event) receptId = null;
  _bewerkenReceptId = receptId;
  _importBronType = 'handmatig';
  _importBronUrl = undefined;
  const g = actieveGelegenheid();

  if (receptId) {
    // Bewerken: sla methode-stap over, ga direct naar formulier
    const r = vindRecept(g, receptId);
    document.getElementById('rf-naam').value = r.naam;
    document.getElementById('rf-porties').value = r.origineelAantalPersonen;
    document.getElementById('rf-tijdvenster').value = r.tijdvenster;
    document.getElementById('rf-bereidingstijd').value = r.bereidingstijdMinuten || '';
    if (r.componenten && r.componenten.length) {
      _formComponentenModus = true;
      _formComponenten = r.componenten.map(comp => ({
        id: comp.id,
        naam: comp.naam,
        tijdvenster: comp.tijdvenster,
        ings: comp.ingredienten.map(i => ({ ...i })),
        staps: comp.stappen.map(s => ({ ...s })),
      }));
      _formIngs = [leegIng()];
      _formStaps = [leegStap()];
    } else {
      _formComponentenModus = false;
      _formComponenten = [];
      _formIngs = r.ingredienten.length ? r.ingredienten.map(i => ({ ...i })) : [leegIng()];
      _formStaps = r.stappen.length ? r.stappen.map(s => ({ ...s })) : [leegStap()];
    }
    _importBronType = r.bronType;
    _importBronUrl = r.bronUrl;
    vulServeermomentDropdown(r.serveermomentId);
    document.getElementById('recept-form-titel').textContent = 'Recept bewerken';
    initReceptFormModus();
    if (!_formComponentenModus) {
      renderIngFormRijen();
      renderStapFormRijen();
    }
    toonReceptStap('form');
  } else {
    // Nieuw recept: toon methode-selectie
    _formComponentenModus = false;
    _formComponenten = [];
    initReceptFormModus();
    vulServeermomentDropdown(defaultServeermomentId());
    document.getElementById('recept-form-titel').textContent = 'Recept toevoegen';
    document.getElementById('link-url').value = '';
    toonReceptStap('methode');
  }

  document.getElementById('modaal-recept').classList.add('actief');
  window.scrollTo(0, 0);
}

function maakStapTvIndicatorHtml(stapTv, erfTv, isInteractief, erfLabel) {
  const geldendTv = stapTv || erfTv || 'ochtend_van';
  const isGeerfd = !stapTv;
  const kleur = `var(--tv-${TV_CSS_KLEUR[geldendTv] || 'ochtend'})`;
  const label = TIJDVENSTERS[geldendTv] || geldendTv;
  if (isInteractief) {
    const erfItem = `<div class="stap-tv-menu-item${!stapTv ? ' actief' : ''}" data-tv="">(volgt ${escHtml(erfLabel)})</div>`;
    const tvItems = TV_VOLGORDE.map(k => [k, TIJDVENSTERS[k]])
      .map(([k, v]) => `<div class="stap-tv-menu-item${stapTv === k ? ' actief' : ''}" data-tv="${k}">${v}</div>`).join('');
    return `<div class="stap-tv-wrapper" data-erf-tv="${escHtml(erfTv || '')}" data-erf-label="${escHtml(erfLabel)}">` +
      `<input type="hidden" class="stap-tijdvenster" value="${escHtml(stapTv || '')}">` +
      `<button type="button" class="stap-tv-ind${isGeerfd ? ' geerfd' : ''}" style="color:${kleur}">${KLOK_SVG} ${escHtml(label)}</button>` +
      `<div class="stap-tv-menu">${erfItem}${tvItems}</div>` +
      `</div>`;
  } else {
    return `<div class="stap-tv-ind${isGeerfd ? ' geerfd' : ''}" style="color:${kleur}">${KLOK_SVG} ${escHtml(label)}</div>`;
  }
}

async function submitReceptHandmatig(e) {
  e.preventDefault();
  const naam = document.getElementById('rf-naam').value.trim();
  if (!naam) { document.getElementById('rf-naam').focus(); return; }

  const porties = parseInt(document.getElementById('rf-porties').value, 10) || 1;
  const tijdvenster = document.getElementById('rf-tijdvenster').value;
  const btRaw = document.getElementById('rf-bereidingstijd').value;
  const gebruikComps = _formComponentenModus;
  const ingredienten = gebruikComps ? [] : leesIngredientRijen();
  const stappen = gebruikComps ? [] : leesStapRijen();
  const componenten = gebruikComps ? leesComponenten() : undefined;
  const g = actieveGelegenheid();

  const serveermomentSel = document.getElementById('rf-serveermoment');
  const serveermomentId = (serveermomentSel && serveermomentSel.offsetParent !== null)
    ? serveermomentSel.value
    : defaultServeermomentId();

  if (_bewerkenReceptId) {
    // Bewerken: bestaand recept updaten
    const r = vindRecept(g, _bewerkenReceptId);
    if (!r) return;
    const backup = { ...r, ingredienten: [...r.ingredienten], stappen: [...r.stappen] };
    r.naam = naam;
    r.origineelAantalPersonen = porties;
    r.tijdvenster = tijdvenster;
    r.serveermomentId = serveermomentId || r.serveermomentId;
    r.bereidingstijdMinuten = btRaw ? parseInt(btRaw, 10) : undefined;
    r.ingredienten = ingredienten;
    r.stappen = stappen;
    if (componenten !== undefined) r.componenten = componenten;
    else delete r.componenten;
    try {
      await saveGelegenheid(g);
      sluitReceptForm();
      renderReceptenTab(g);
      wisselRecept(_bewerkenReceptId);
      renderOverzichtTab(g);
    } catch (err) {
      Object.assign(r, backup);
      alert(STRINGS.opslagFout);
    }
  } else {
    // Nieuw recept aanmaken
    const recept = {
      id: maakId('recept'),
      naam,
      bronType: _importBronType || 'handmatig',
      bronUrl: _importBronUrl,
      origineelAantalPersonen: porties,
      geschaaldAantalPersonen: porties,
      bereidingstijdMinuten: btRaw ? parseInt(btRaw, 10) : undefined,
      tijdvenster,
      serveermomentId: serveermomentId || defaultServeermomentId(),
      ingredienten,
      stappen,
      ...(componenten !== undefined && { componenten }),
      aangemaakt: new Date().toISOString(),
    };
    voegReceptToe(g, recept);
    try {
      await saveGelegenheid(g);
      sluitReceptForm();
      state.actieveReceptId = recept.id;
      wisselTab('recepten');
    } catch (err) {
      verwijderRecept(g, recept.id);
      alert(STRINGS.opslagFout);
    }
  }
}

  document.getElementById('btn-submit-geleg').textContent = 'Aanmaken';
  document.getElementById('f-naam').value = '';
  document.getElementById('f-datum').value = '';
  document.getElementById('f-personen').value = '4';
  renderServeermomentRijen();
  document.getElementById('modaal-geleg').classList.add('actief');
  setTimeout(() => document.getElementById('f-naam').focus(), 50);
}

function openModaalBewerkGeleg() {
  const g = actieveGelegenheid();
  if (!g) return;
  state.modaalModus = 'bewerken';
  _verwijderdeServeermomentIds = [];
  // Laad serveermomenten gesorteerd op tijdstip
  const gesorteerd = [...(g.serveermomenten || [])].sort((a, b) => a.tijdstip.localeCompare(b.tijdstip));
  _formServeermomenten = gesorteerd.map((sm, i) => ({ ...sm, volgorde: i + 1 }));
  if (_formServeermomenten.length === 0) {
    _formServeermomenten = [{ id: maakId('serv'), naam: 'Serveren', tijdstip: g.serveerTijd || '12:00', volgorde: 1 }];
  }
  document.getElementById('modaal-geleg-titel').textContent = 'Gelegenheid bewerken';
  document.getElementById('btn-submit-geleg').textContent = 'Opslaan';
  document.getElementById('f-naam').value = g.naam;
  document.getElementById('f-datum').value = g.datum || '';
  document.getElementById('f-personen').value = g.aantalPersonen;
  renderServeermomentRijen();
  document.getElementById('modaal-geleg').classList.add('actief');
  setTimeout(() => document.getElementById('f-naam').focus(), 50);
}

function sluitModaalGeleg() {
  document.getElementById('modaal-geleg').classList.remove('actief');
}

async function submitGelegForm(e) {
  e.preventDefault();
  const naam = document.getElementById('f-naam').value.trim();
  const datum = document.getElementById('f-datum').value;
  const personen = parseInt(document.getElementById('f-personen').value, 10);
  if (!naam || !personen) return;

  // Lees serveermomenten uit het formulier
  saveServeermomentState();
  if (_formServeermomenten.length === 0) return;
  const eersteServeertijd = _formServeermomenten[0].tijdstip || '12:00';

  if (state.modaalModus === 'aanmaken') {
    const nu = new Date().toISOString();
    const g = {
      id: maakId('geleg'),
      naam, datum,
      serveerTijd: eersteServeertijd, // behoud voor compat
      serveermomenten: _formServeermomenten,
      aantalPersonen: personen,
      recepten: [],
      afgevinkteIngredientKeys: [],
      afgevinkteStapKeys: [],
      afgevinktePrepKeys: [],
      schemaVersie: 2,
      aangemaakt: nu, gewijzigd: nu,
    };
    try {
      await saveGelegenheid(g);
      state.gelegenheden.push(g);
      sorteerGelegenheden(state.gelegenheden);
      sluitModaalGeleg();
      openGelegenheid(g.id);
    } catch (err) { alert(STRINGS.opslagFout); }
  } else {
    const g = actieveGelegenheid();
    if (!g) return;

    // Verplaats recepten van verwijderde momenten naar het eerste overgebleven moment
    if (_verwijderdeServeermomentIds.length > 0) {
      const eersteId = _formServeermomenten[0]?.id;
      if (eersteId) {
        for (const r of g.recepten) {
          if (_verwijderdeServeermomentIds.includes(r.serveermomentId)) {
            r.serveermomentId = eersteId;
          }
        }
      }
    }

    // Update gelegenheid-velden
    Object.assign(g, {
      naam, datum,
      serveerTijd: eersteServeertijd,
      serveermomenten: _formServeermomenten,
      aantalPersonen: personen,
    });
    try {
      await saveGelegenheid(g);
      sorteerGelegenheden(state.gelegenheden);
      sluitModaalGeleg();
      renderGelegenheidHeader();
      // Overzicht-tab bijwerken als die actief is
      if (state.actieveTab === 'overzicht') renderOverzichtTab(g);
    } catch (err) { alert(STRINGS.opslagFout); }
  }
}

async function bevestigVerwijderGelegenheid(id) {
  const g = state.gelegenheden.find(g => g.id === id);
  if (!g || !confirm(STRINGS.verwijderGelegBevestiging(g.naam))) return;
  try {
    await deleteGelegenheid(id);
    state.gelegenheden = state.gelegenheden.filter(g => g.id !== id);
    renderStartscherm();
  } catch (e) { alert(STRINGS.opslagFout); }
}

// ─── Hulpfuncties ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // Startscherm
  document.getElementById('btn-nieuwe-geleg').addEventListener('click', openModaalNieuweGeleg);

  // Gelegenheid
  document.getElementById('btn-terug-start').addEventListener('click', naarStartscherm);
  document.getElementById('btn-bewerk-geleg').addEventListener('click', openModaalBewerkGeleg);
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => wisselTab(t.dataset.tab)));

  // Gelegenheid-modaal
  document.getElementById('btn-annuleer-geleg').addEventListener('click', sluitModaalGeleg);
  document.getElementById('modaal-geleg').addEventListener('click', (e) => { if (e.target === e.currentTarget) sluitModaalGeleg(); });
  document.getElementById('form-geleg').addEventListener('submit', submitGelegForm);
  document.getElementById('btn-voeg-serveerm-toe').addEventListener('click', () => {
    saveServeermomentState();
    const volgend = _formServeermomenten.length > 0
      ? _formServeermomenten[_formServeermomenten.length - 1].tijdstip
      : '12:00';
    // Zet tijdstip +1 uur
    const [h, m] = volgend.split(':').map(Number);
    const nieuwTijdstip = `${String((h + 1) % 24).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    _formServeermomenten.push({
      id: maakId('serv'),
      naam: '',
      tijdstip: nieuwTijdstip,
      volgorde: _formServeermomenten.length + 1,
    });
    renderServeermomentRijen();
    // Focus op het nieuwe naam-veld
    setTimeout(() => {
      const velden = document.querySelectorAll('.serveerm-naam');
      if (velden.length) velden[velden.length - 1].focus();
    }, 30);
  });

  // Recept-form: methode-selectie
  document.getElementById('btn-methode-handmatig').addEventListener('click', () => {
    _formComponentenModus = false;
    _formComponenten = [];
    _formIngs = [leegIng()]; _formStaps = [leegStap()];
    document.getElementById('rf-naam').value = '';
    document.getElementById('rf-porties').value = actieveGelegenheid()?.aantalPersonen || 4;
    document.getElementById('rf-tijdvenster').value = 'ochtend_van';
    document.getElementById('rf-bereidingstijd').value = '';
    initReceptFormModus();
    renderIngFormRijen(); renderStapFormRijen();
    toonReceptStap('form');
    setTimeout(() => document.getElementById('rf-naam').focus(), 50);
  });

  const fotoInput = document.getElementById('foto-input');
  document.getElementById('btn-methode-foto').addEventListener('click', () => fotoInput.click());
  fotoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (file) importeerFoto(file);
  });

  document.getElementById('btn-methode-link').addEventListener('click', () => toonReceptStap('link'));
  document.getElementById('btn-link-terug').addEventListener('click', () => toonReceptStap('methode'));
  document.getElementById('btn-importeer-link').addEventListener('click', () => {
    const url = document.getElementById('link-url').value.trim();
    if (!url) { document.getElementById('link-url').focus(); return; }
    importeerLink(url);
  });
  document.getElementById('link-url').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-importeer-link').click(); }
  });

  document.getElementById('btn-fout-handmatig').addEventListener('click', () => {
    _formComponentenModus = false;
    _formComponenten = [];
    _formIngs = [leegIng()]; _formStaps = [leegStap()];
    initReceptFormModus();
    renderIngFormRijen(); renderStapFormRijen();
    toonReceptStap('form');
  });

  // Recept-form
  document.getElementById('btn-annuleer-recept').addEventListener('click', sluitReceptForm);
  document.getElementById('btn-footer-annuleer').addEventListener('click', sluitReceptForm);
  document.getElementById('btn-voeg-ing-toe').addEventListener('click', () => {
    saveIngState();
    _formIngs.push(leegIng());
    renderIngFormRijen();
    setTimeout(() => { const l = document.querySelectorAll('.ing-naam'); if (l.length) l[l.length-1].focus(); }, 30);
  });
  document.getElementById('btn-voeg-stap-toe').addEventListener('click', () => {
    saveStapState();
    _formStaps.push(leegStap());
    renderStapFormRijen();
    setTimeout(() => { const l = document.querySelectorAll('.stap-tekst'); if (l.length) l[l.length-1].focus(); }, 30);
  });
  document.getElementById('form-recept').addEventListener('submit', submitReceptHandmatig);

  // Componenten toggle + nieuw component
  document.getElementById('btn-toggle-componenten').addEventListener('click', () => {
    if (_formComponentenModus) schakelNaarEnkelvoudigModus();
    else schakelNaarComponentModus();
  });
  // Initiële registratie — wordt ook herregistreerd via .onclick in renderComponenten()
  document.getElementById('btn-voeg-comp-toe').addEventListener('click', () => {
    if (!_formComponentenModus) return;
    saveComponentenState();
    _formComponenten.push(leegComp());
    renderComponenten();
  });

  // Stap tijdvenster indicator menus (event delegation)
  document.addEventListener('click', (e) => {
    const ind = e.target.closest('button.stap-tv-ind');
    const item = e.target.closest('.stap-tv-menu-item');
    if (ind) {
      const menu = ind.nextElementSibling;
      const isOpen = menu && menu.classList.contains('open');
      document.querySelectorAll('.stap-tv-menu.open').forEach(m => m.classList.remove('open'));
      if (menu && !isOpen) menu.classList.add('open');
      e.stopPropagation();
    } else if (item) {
      const menu = item.closest('.stap-tv-menu');
      const wrapper = menu?.parentElement;
      if (!wrapper) return;
      const hiddenInput = wrapper.querySelector('.stap-tijdvenster');
      const btn = wrapper.querySelector('button.stap-tv-ind');
      const newTv = item.dataset.tv;
      if (hiddenInput) hiddenInput.value = newTv;
      if (btn) {
        const erfTv = wrapper.dataset.erfTv || 'ochtend_van';
        const geldendTv = newTv || erfTv;
        const kleur = `var(--tv-${TV_CSS_KLEUR[geldendTv] || 'ochtend'})`;
        const label = TIJDVENSTERS[geldendTv] || geldendTv;
        btn.style.color = kleur;
        btn.className = `stap-tv-ind${!newTv ? ' geerfd' : ''}`;
        btn.innerHTML = `${KLOK_SVG} ${escHtml(label)}`;
      }
      menu.querySelectorAll('.stap-tv-menu-item').forEach(mi => {
        mi.classList.toggle('actief', mi.dataset.tv === newTv);
      });
      menu.classList.remove('open');
      e.stopPropagation();
    } else if (!e.target.closest('.stap-tv-menu')) {
      document.querySelectorAll('.stap-tv-menu.open').forEach(m => m.classList.remove('open'));
    }
  });

  // Cook Mode
  document.getElementById('btn-cook-sluiten').addEventListener('click', sluitCookMode);

  // Data laden
  state.gelegenheden = await loadAllGelegenheden();
  renderStartscherm();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
