<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Fire">
<title>Fire</title>
<style>
:root {
  --bg: #1f1916;
  --card: #2a2421;
  --card2: #34302c;
  --ac: #c8a96e;
  --ac2: #7fb069;
  --tx: #f0e6d3;
  --mu: #888;
  --da: #d96b6b;
  --bo: #3d3733;
  --radius: 12px;
  --radius-sm: 7px;
  --gap: 14px;

  /* Semantische tijdvenster-kleuren (koel → warm) */
  --tv-week:      #6b8eaa;
  --tv-paardagen: #7a9bb5;
  --tv-dag:       #7fb069;
  --tv-avond:     #9bb86e;
  --tv-ochtend:   #c8a96e;
  --tv-middag:    #d4a05e;
  --tv-tweeuur:   #d4925e;
  --tv-uur:       #d68554;
  --tv-halfuur:   #d96e4f;
  --tv-alaminute: #d96b6b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* iOS Safari zoomt in op inputs met font-size < 16px — dit voorkomt dat */
input, textarea, select { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--tx);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

#app { max-width: 740px; margin: 0 auto; }

/* ── Schermen ── */
.scherm { display: none; }
.scherm.actief { display: block; }

/* ── Gedeelde knoppen ── */
.btn-primair {
  background: var(--ac);
  color: #1a1a1a;
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: opacity .15s;
}
.btn-primair:active { opacity: .75; }
.btn-secundair {
  background: transparent;
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: 20px;
  padding: 9px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color .15s;
}
.btn-secundair:active { border-color: var(--ac); }
.btn-icon {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-icon:active { border-color: var(--da); color: var(--da); }
.btn-danger {
  background: transparent;
  border: 1px solid var(--da);
  color: var(--da);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.btn-danger:active { background: var(--da); color: #fff; }
.btn-toevoegen {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 9px;
  background: transparent;
  border: 1px dashed var(--bo);
  border-radius: var(--radius);
  color: var(--mu);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  margin-top: 6px;
}
.btn-toevoegen:active { border-color: var(--ac); color: var(--ac); }

/* ── Formulier ── */
.form-veld { margin-bottom: 14px; }
.form-veld label {
  display: block;
  font-size: 11px;
  color: var(--mu);
  text-transform: uppercase;
  letter-spacing: .7px;
  margin-bottom: 5px;
}
.form-veld input,
.form-veld select,
.form-inp {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: var(--radius-sm);
  padding: 9px 10px;
  font-size: 16px;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}
.form-veld input:focus,
.form-veld select:focus,
.form-inp:focus { outline: none; border-color: var(--ac); }
.form-inp::placeholder { color: var(--mu); }
.form-rij { display: flex; gap: 10px; }
.form-rij .form-veld { flex: 1; }
.form-knoppen { display: flex; gap: 8px; margin-top: 6px; }
.form-knoppen .btn-primair { flex: 2; justify-content: center; }
.form-knoppen .btn-secundair { flex: 1; }

/* ── Startscherm ── */
.start-header {
  padding: 24px var(--gap) 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.start-logo { font-size: 22px; font-weight: 700; color: var(--ac); letter-spacing: -.3px; }

.gelegenheden-lijst { padding: 0 var(--gap) var(--gap); display: flex; flex-direction: column; gap: 8px; }
.geleg-kaart {
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: border-color .15s;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.geleg-kaart:active { border-color: var(--ac); }
.geleg-info { flex: 1; min-width: 0; }
.geleg-naam { font-size: 15px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.geleg-meta { font-size: 11px; color: var(--mu); }
.geleg-acties { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.leeg-staat { padding: 48px var(--gap) 24px; text-align: center; color: var(--mu); font-size: 13px; line-height: 1.6; }
.leeg-staat p { margin-bottom: 20px; }

/* ── Gelegenheid: header ── */
.geleg-header {
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 11px var(--gap) 10px;
}
.geleg-header-top { display: flex; align-items: center; gap: 8px; }
.btn-terug {
  background: transparent;
  border: none;
  color: var(--ac);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-terug:active { opacity: .7; }
.geleg-header-midden { flex: 1; text-align: center; min-width: 0; }
.geleg-header-titel { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.geleg-header-meta { font-size: 11px; color: var(--mu); margin-top: 2px; text-align: center; }

/* ── Gelegenheid: tab-balk ── */
.tab-balk {
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 62px;
  z-index: 99;
}
.tab-balk::-webkit-scrollbar { display: none; }
.tab {
  padding: 11px 14px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 600;
  color: var(--mu);
  border-bottom: 2px solid transparent;
  border-top: none; border-left: none; border-right: none;
  background: transparent;
  transition: color .15s, border-color .15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.tab.actief { color: var(--ac); border-bottom-color: var(--ac); }

/* ── Tab-inhoud ── */
.tab-inhoud { display: none; padding: var(--gap); }
.tab-inhoud.actief { display: block; }
.tab-leeg { color: var(--mu); font-size: 13px; line-height: 1.6; text-align: center; padding: 32px 0 16px; }

/* ── Overzicht tab ── */
.ov-stats { display: flex; gap: 8px; margin-bottom: var(--gap); }
.ov-stat {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 10px;
  text-align: center;
}
.ov-stat-getal { font-size: 22px; font-weight: 700; color: var(--ac); display: block; }
.ov-stat-label { font-size: 10px; color: var(--mu); text-transform: uppercase; letter-spacing: .5px; }

.ov-recept-kaart {
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color .15s;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.ov-recept-kaart:active { border-color: var(--ac); }
.ov-recept-naam { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.ov-recept-meta { font-size: 11px; color: var(--mu); }
.tijdvenster-badge {
  font-size: 10px;
  color: var(--ac);
  background: var(--card2);
  border-radius: 10px;
  padding: 3px 8px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Recepten tab: chips ── */
.recept-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.recept-chip {
  padding: 6px 13px;
  border-radius: 20px;
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all .15s;
  white-space: nowrap;
  max-width: 150px;
  overflow: hidden;
  text-overflow: ellipsis;
  -webkit-tap-highlight-color: transparent;
}
.recept-chip.actief { background: var(--ac); color: #1a1a1a; border-color: var(--ac); }
.recept-chip.chip-plus {
  color: var(--ac);
  border-color: var(--ac);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Recept detail ── */
.recept-detail-naam {
  font-size: 17px;
  font-weight: 700;
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--bo);
  color: var(--tx);
  padding: 4px 0 6px;
  margin-bottom: 10px;
  font-family: inherit;
}
.recept-detail-naam:focus { outline: none; border-bottom-color: var(--ac); }

.recept-meta-rij { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.recept-bron {
  font-size: 10px;
  color: var(--mu);
  background: var(--card2);
  border-radius: 8px;
  padding: 3px 8px;
}
.recept-tv-select {
  font-size: 16px;
  color: var(--ac);
  background: var(--card2);
  border: none;
  border-radius: 10px;
  padding: 3px 8px;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
}
.recept-tv-select:focus { outline: none; }

.schaler {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--card2);
  border-radius: var(--radius);
  padding: 9px 12px;
}
.schaler-label { font-size: 12px; color: var(--mu); flex: 1; }
.schaler-getal { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; }
.schaler-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--tx);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.schaler-btn:active { background: var(--ac); border-color: var(--ac); color: #1a1a1a; }
.schaler-btn:disabled { opacity: .3; cursor: default; }

.sectie-kop {
  font-size: 10px;
  color: var(--mu);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--bo);
}
.sectie-kop:first-of-type { margin-top: 0; }

.ing-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.ing-item:last-child { border-bottom: none; }
.ing-cb {
  width: 17px;
  height: 17px;
  border-radius: 5px;
  border: 1.5px solid var(--bo);
  background: var(--card2);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .15s;
  position: relative;
}
.ing-item.afgevinkt .ing-cb { background: var(--ac2); border-color: var(--ac2); }
.ing-item.afgevinkt .ing-cb::after {
  content: '';
  position: absolute;
  left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg);
}
.ing-item.afgevinkt .ing-tekst { text-decoration: line-through; color: var(--mu); }
.ing-tekst { font-size: 13px; line-height: 1.4; flex: 1; }

.stap-item {
  display: flex;
  gap: 9px;
  padding: 8px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  align-items: flex-start;
  -webkit-tap-highlight-color: transparent;
}
.stap-item:last-child { border-bottom: none; }
.stap-nr {
  width: 21px;
  height: 21px;
  border-radius: 50%;
  background: var(--ac);
  color: #1a1a1a;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: background .15s;
}
.stap-item.afgevinkt .stap-nr { background: var(--ac2); }
.stap-tekst-detail { font-size: 13px; line-height: 1.5; flex: 1; }
.stap-item.afgevinkt .stap-tekst-detail { color: var(--mu); text-decoration: line-through; }
.stap-tv-ind {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 10px;
  border: 1px solid currentColor;
  cursor: pointer; background: transparent;
  font-family: inherit; line-height: 1.4;
  -webkit-tap-highlight-color: transparent;
}
.stap-tv-ind.geerfd { opacity: 0.7; }
div.stap-tv-ind { cursor: default; pointer-events: none; }
.stap-tv-wrapper { position: relative; display: inline-block; margin-top: 5px; }
.stap-tv-menu {
  position: absolute; z-index: 200; left: 0; top: calc(100% + 4px);
  background: var(--card); border: 1px solid var(--bo);
  border-radius: var(--radius-sm); min-width: 170px;
  box-shadow: 0 4px 12px rgba(0,0,0,.3); display: none;
}
.stap-tv-menu.open { display: block; }
.stap-tv-menu-item {
  padding: 8px 12px; font-size: 12px; cursor: pointer; color: var(--tx);
  border-bottom: 1px solid var(--bo);
}
.stap-tv-menu-item:last-child { border-bottom: none; }
.stap-tv-menu-item.actief { color: var(--ac); font-weight: 600; }

.recept-acties {
  display: flex;
  gap: 8px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--bo);
}

/* ── Methode-selectie ── */
.methode-knoppen {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 24px 0 8px;
}
.methode-knop {
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 22px 10px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--tx);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  transition: border-color .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.methode-knop:active { border-color: var(--ac); color: var(--ac); }
.methode-handmatig-link {
  background: none; border: none; color: var(--mu);
  font-size: 12px; font-family: inherit; cursor: pointer;
  text-decoration: underline; padding: 4px 8px;
  -webkit-tap-highlight-color: transparent;
}
.methode-handmatig-link:active { color: var(--tx); }

/* ── Laden ── */
.laden-staat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 56px var(--gap);
  text-align: center;
  color: var(--mu);
  font-size: 13px;
}
.laden-ring {
  width: 38px;
  height: 38px;
  border: 3px solid var(--bo);
  border-top-color: var(--ac);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Import-fout ── */
.import-fout {
  padding: 32px var(--gap);
  text-align: center;
  color: var(--tx);
  font-size: 13px;
  line-height: 1.7;
}
.import-fout-tekst { color: var(--da); margin-bottom: 16px; }

/* ── Recept-form modaal (full-screen) ── */
.modaal-fs {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  flex-direction: column;
}
.modaal-fs.actief { display: flex; }
.modaal-fs-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px var(--gap);
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  flex-shrink: 0;
  gap: 10px;
}
.modaal-fs-titel { font-size: 14px; font-weight: 700; color: var(--ac); flex: 1; text-align: center; }
.modaal-fs-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: var(--gap);
  max-width: 740px;
  margin: 0 auto;
  width: 100%;
}

/* ── Sticky footer recept-formulier ── */
.recept-form-footer {
  flex-shrink: 0;
  display: flex;
  gap: 10px;
  padding: 12px var(--gap);
  background: var(--bg);
  border-top: 1px solid var(--bo);
  max-width: 740px;
  margin: 0 auto;
  width: 100%;
}
.recept-form-footer .btn-primair { flex: 2; justify-content: center; }
.form-sectie-kop {
  font-size: 12px;
  font-weight: 700;
  color: var(--tx);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin: 12px 0 6px;
  padding: 6px 0 4px;
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--bg);
}

/* ── Ingrediënt-formrij ── */
.ing-form-rij {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 7px 8px;
  margin-bottom: 6px;
}
.ing-form-top { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; flex-wrap: wrap; }
.ing-form-bot { display: flex; gap: 5px; align-items: center; }
.inp-hoeveelheid { width: 68px; flex-shrink: 0; padding: 7px 6px; }
.inp-eenheid { width: 120px; flex-shrink: 0; padding: 7px 4px; }
.inp-naam { flex: 1; min-width: 130px; }
.inp-opmerking { flex: 1; min-width: 0; }
.inp-productgroep { flex: 1; min-width: 0; }
.form-inp { padding: 7px 8px; font-size: 16px; }
.btn-rij-del {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  transition: color .15s;
  line-height: 1;
}
.btn-rij-del:active { color: var(--da); }

/* ── Stap-formrij ── */
.stap-form-rij {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 7px 8px;
  margin-bottom: 6px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.stap-form-nr {
  width: 21px; height: 21px;
  border-radius: 50%;
  background: var(--ac);
  color: #1a1a1a;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 7px;
}
.stap-form-body { flex: 1; }
.stap-form-textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 44px;
}
.stap-form-textarea:focus { outline: none; border-color: var(--ac); }
.stap-form-timer { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.stap-form-timer label { font-size: 11px; color: var(--mu); }
.stap-form-timer span { font-size: 11px; color: var(--mu); }
.inp-timer { width: 56px; flex-shrink: 0; padding: 5px 7px; font-size: 16px; }
.stap-form-tv { margin-top: 5px; }

/* ── Boodschappenlijst ── */
.boodschappen-groep { margin-bottom: 20px; }
.boodschappen-groep-kop {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--mu);
  padding: 0 0 8px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 6px;
}
.boodschap-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.boodschap-item:last-child { border-bottom: none; }
.boodschap-cb {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--bo);
  background: var(--card2);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .15s;
  position: relative;
}
.boodschap-item.afgevinkt .boodschap-cb { background: var(--ac2); border-color: var(--ac2); }
.boodschap-item.afgevinkt .boodschap-cb::after {
  content: '';
  position: absolute;
  left: 4px; top: 1px;
  width: 5px; height: 9px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg);
}
.boodschap-tekst { font-size: 13px; line-height: 1.4; flex: 1; }
.boodschap-item.afgevinkt .boodschap-tekst { text-decoration: line-through; color: var(--mu); }
.boodschappen-reset {
  margin-top: 8px;
  display: flex;
  justify-content: center;
}
.in-huis-sectie { margin-top: 24px; }
.in-huis-kop {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--ac2);
  padding: 0 0 8px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 6px;
}

/* ── Tijdlijn ── */
.tijdlijn-sectie { margin-bottom: 22px; }
.tijdlijn-sectie-kop {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  padding: 0 0 8px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 6px;
}
.tijdlijn-handeling {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.tijdlijn-handeling:last-child { border-bottom: none; }
.tl-item-body { flex: 1; min-width: 0; }
.tl-stap-tekst { font-size: 13px; font-weight: 500; line-height: 1.4; display: block; }
.tl-recept-naam { font-size: 11px; color: var(--mu); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.tl-pijlen { display: flex; flex-direction: column; flex-shrink: 0; }
.tl-pijl-btn {
  width: 44px;
  height: 22px;
  background: transparent;
  border: none;
  color: var(--mu);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: color .1s;
}
.tl-pijl-btn:not([disabled]):active { color: var(--ac); }
.tl-pijl-btn[disabled] { opacity: .2; cursor: default; }

/* ── Sheet modaal (gelegenheid) ── */
.modaal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modaal-overlay.actief { display: flex; }
.modaal {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px var(--gap) calc(var(--gap) + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 740px;
  max-height: 90vh;
  overflow-y: auto;
}
.modaal-titel { font-size: 16px; font-weight: 700; color: var(--ac); margin-bottom: 18px; }

/* ── Cook Mode ── */
.cook-mode {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 400;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.cook-mode.actief { display: block; }
.cook-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px var(--gap);
  background: var(--card);
  border-bottom: 1px solid var(--bo);
  position: sticky;
  top: 0;
  z-index: 1;
}
.cook-titel {
  font-size: 16px;
  font-weight: 700;
  color: var(--ac);
  flex: 1;
  text-align: center;
  margin: 0 8px;
}
.cook-sluiten {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--bo);
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1;
  flex-shrink: 0;
  transition: all .15s;
}
.cook-sluiten:active { border-color: var(--da); color: var(--da); }
.cook-body { padding: var(--gap); max-width: 740px; margin: 0 auto; }
.cook-sectie-kop {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--mu);
  padding: 0 0 8px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 8px;
  margin-top: 20px;
}
.cook-sectie-kop:first-child { margin-top: 0; }
/* Ingrediënten in cook mode: compact */
.cook-ing-item {
  font-size: 15px;
  line-height: 1.6;
  padding: 4px 0;
  color: var(--tx);
  border-bottom: 1px solid var(--bo);
}
.cook-ing-item:last-child { border-bottom: none; }
/* Stappen in cook mode: grote tikdoelen */
.cook-stap {
  display: flex;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--bo);
  cursor: pointer;
  align-items: flex-start;
  -webkit-tap-highlight-color: transparent;
}
.cook-stap:last-child { border-bottom: none; }
.cook-stap-nr {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--ac);
  color: #1a1a1a;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.cook-stap.afgevinkt .cook-stap-nr { background: var(--ac2); }
.cook-stap-body { flex: 1; }
.cook-stap-tekst {
  font-size: 15px;
  line-height: 1.6;
  transition: color .15s;
}
.cook-stap.afgevinkt .cook-stap-tekst { color: var(--mu); text-decoration: line-through; }
/* Timer */
.cook-timer {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}
.cook-timer-btn {
  background: var(--card2);
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.cook-timer-btn.actief { border-color: var(--ac); color: var(--ac); }
.cook-timer-display {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--ac);
  min-width: 52px;
}
.cook-timer-display.op { color: var(--ac2); }
.cook-timer-display.verlopen { color: var(--da); }

/* ── Component-blocks in recept-form ── */
.comp-blok {
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 12px;
  background: var(--card);
}
.comp-blok-header {
  display: flex;
  gap: 6px;
  align-items: center;
  margin: -12px -12px 10px;
  padding: 10px 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--card);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border-bottom: 1px solid var(--bo);
}
.comp-blok-naam { flex: 1; min-width: 120px; }
.comp-blok-tv { width: 130px; flex-shrink: 0; font-size: 16px; padding: 6px 6px; }
.comp-sectie-kop {
  font-size: 10px;
  color: var(--mu);
  text-transform: uppercase;
  letter-spacing: .8px;
  font-weight: 700;
  margin: 10px 0 6px;
}

/* ── Component-kaarten in detail-weergave (inklapbaar) ── */
.comp-detail-card {
  background: var(--card);
  border: 1px solid var(--bo);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.comp-detail-kop {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 13px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.comp-detail-kop:active { opacity: .8; }
.comp-detail-naam {
  font-size: 13px;
  font-weight: 700;
  flex: 1;
}
.comp-chevron {
  color: var(--mu);
  flex-shrink: 0;
  transition: transform .2s;
}
.comp-detail-card.open .comp-chevron { transform: rotate(180deg); }
.comp-detail-body {
  display: none;
  padding: 0 13px 13px;
  border-top: 1px solid var(--bo);
}
.comp-detail-card.open .comp-detail-body { display: block; }
.comp-alle-toggle-rij {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}
.btn-comp-alle-toggle {
  background: transparent;
  border: none;
  color: var(--ac);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-comp-alle-toggle:active { opacity: .7; }

/* ── Cook Mode navigatie ── */
.cook-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 0 4px;
  border-top: 1px solid var(--bo);
  margin-top: 8px;
}
.cook-comp-indicator {
  flex: 1;
  font-size: 11px;
  color: var(--mu);
  text-align: center;
}
.cook-nav-btn {
  background: var(--card2);
  border: 1px solid var(--bo);
  color: var(--tx);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color .15s;
  flex-shrink: 0;
}
.cook-nav-btn:disabled { opacity: .3; cursor: default; }
.cook-nav-btn:not(:disabled):active { border-color: var(--ac); }

/* ── Serveermoment-rijen ── */
.serveerm-rij {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}
.serveerm-rij .form-inp { font-size: 13px; }
.inp-serveerm-naam { flex: 1; }
.inp-serveerm-tijd { width: 88px; flex-shrink: 0; }
.serveerm-del:disabled { opacity: .25; cursor: default; }

/* ── Serveermoment-kop in Overzicht ── */
.ov-serveerm-kop {
  font-size: 12px;
  font-weight: 700;
  color: var(--ac);
  padding: 10px 0 6px;
  border-bottom: 1px solid var(--bo);
  margin-bottom: 6px;
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ov-serveerm-kop:first-child { margin-top: 0; }

/* SVG sprite */
svg.sprite { display: none; }
</style>
</head>
<body>

<svg class="sprite" xmlns="http://www.w3.org/2000/svg">

<div id="app">

  <!-- ── Startscherm ── -->
  <div id="scherm-start" class="scherm actief">
    <div class="start-header">
      <span class="start-logo">Fire</span>
      <button class="btn-primair" id="btn-nieuwe-geleg">
        <svg width="14" height="14"><use href="#ic-plus"/></svg>
        Nieuwe gelegenheid
      </button>
    </div>
    <div id="geleg-inhoud"></div>
  </div>

  <!-- ── Gelegenheid-weergave ── -->
  <div id="scherm-gelegenheid" class="scherm">

    <div class="geleg-header">
      <div class="geleg-header-top">
        <button class="btn-terug" id="btn-terug-start">
          <svg width="14" height="14"><use href="#ic-chevron-left"/></svg>Fire
        </button>
        <div class="geleg-header-midden">
          <div class="geleg-header-titel" id="geleg-header-titel"></div>
        </div>
        <button class="btn-icon" id="btn-bewerk-geleg" title="Bewerken">
          <svg width="14" height="14"><use href="#ic-edit"/></svg>
        </button>
      </div>
      <div class="geleg-header-meta" id="geleg-header-meta"></div>
    </div>

    <nav class="tab-balk" role="tablist">
      <button class="tab actief" data-tab="overzicht" role="tab">Overzicht</button>
      <button class="tab" data-tab="recepten" role="tab">Recepten</button>
      <button class="tab" data-tab="boodschappen" role="tab">Boodschappen</button>
      <button class="tab" data-tab="tijdlijn" role="tab">Tijdlijn</button>
    </nav>

    <div id="tab-overzicht" class="tab-inhoud actief" role="tabpanel">
      <div id="overzicht-inhoud"></div>
    </div>
    <div id="tab-recepten" class="tab-inhoud" role="tabpanel">
      <div id="recept-chips-balk" class="recept-chips"></div>
      <div id="recept-detail-container"></div>
    </div>
    <div id="tab-boodschappen" class="tab-inhoud" role="tabpanel">
      <div class="tab-leeg">Nog geen ingrediënten. Voeg recepten toe om de lijst op te bouwen.</div>
    </div>
    <div id="tab-tijdlijn" class="tab-inhoud" role="tabpanel">
      <div class="tab-leeg">De tijdlijn verschijnt zodra je recepten hebt toegevoegd.</div>
    </div>

  </div>

</div>

<!-- ── Cook Mode ── -->
<div id="cook-mode" class="cook-mode" role="dialog" aria-modal="true">
  <div class="cook-header">
    <div style="width:32px"></div>
    <div class="cook-titel" id="cook-titel"></div>

  <div class="cook-body" id="cook-body"></div>

<!-- ── Modaal: nieuwe / bewerk gelegenheid ── -->
<div class="modaal-overlay" id="modaal-geleg" role="dialog" aria-modal="true">
  <div class="modaal">
    <div class="modaal-titel" id="modaal-geleg-titel">Nieuwe gelegenheid</div>
    <form id="form-geleg" novalidate>
      <div class="form-veld">
        <label for="f-naam">Naam</label>
        <input type="text" id="f-naam" placeholder="bijv. Paasbrunch 2026" required maxlength="80" autocomplete="off">
      </div>
      <div class="form-rij">
        <div class="form-veld">
          <label for="f-datum">Datum <span style="color:var(--mu);font-size:10px;text-transform:none;letter-spacing:0">(optioneel)</span></label>
          <input type="date" id="f-datum">
        </div>
        <div class="form-veld">
          <label for="f-personen">Personen</label>
          <input type="number" id="f-personen" value="4" min="1" max="50" required>
        </div>
      </div>
      <div class="form-sectie-kop" style="margin-top:16px;margin-bottom:8px">Serveer-momenten</div>
      <div id="serveerm-container"></div>
      <button type="button" class="btn-toevoegen" id="btn-voeg-serveerm-toe" style="margin-top:4px;margin-bottom:4px">
        <svg width="13" height="13"><use href="#ic-plus"/></svg>
        Serveer-moment toevoegen
      </button>
      <div class="form-knoppen" style="margin-top:14px">
        <button type="button" class="btn-secundair" id="btn-annuleer-geleg">Annuleren</button>
        <button type="submit" class="btn-primair" id="btn-submit-geleg">Aanmaken</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Recept toevoegen (full-screen) ── -->
<div id="modaal-recept" class="modaal-fs">
  <div class="modaal-fs-header">
    <button type="button" class="btn-secundair" id="btn-annuleer-recept" style="padding:6px 14px;flex-shrink:0">Annuleren</button>
    <span class="modaal-fs-titel" id="recept-form-titel">Recept toevoegen</span>
    <div style="width:80px;flex-shrink:0"></div><!-- placeholder voor balans -->
  </div>
  <div class="modaal-fs-body">

    <!-- Stap 1: methode kiezen -->
    <div id="recept-stap-methode">
      <div class="methode-knoppen">
        <button type="button" class="methode-knop" id="btn-methode-foto">
          <svg width="26" height="26"><use href="#ic-camera"/></svg>
          Foto
        </button>
        <button type="button" class="methode-knop" id="btn-methode-link">
          <svg width="26" height="26"><use href="#ic-link"/></svg>
          Link
        </button>
      </div>
      <div style="text-align:center;padding:4px 0 8px">
        <button type="button" class="methode-handmatig-link" id="btn-methode-handmatig">of voer handmatig in</button>
      </div>
      <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none">
    </div>

    <!-- Stap 2: link invoer -->
    <div id="recept-stap-link" style="display:none">
      <div class="form-veld" style="margin-top:8px">
        <label for="link-url">URL van het recept</label>
        <input type="url" id="link-url" class="form-inp" placeholder="https://…" autocomplete="off">
      </div>
      <div class="form-knoppen">
        <button type="button" class="btn-secundair" id="btn-link-terug">Terug</button>
        <button type="button" class="btn-primair" id="btn-importeer-link" style="flex:2;justify-content:center">
          <svg width="13" height="13"><use href="#ic-link"/></svg>
          Importeren
        </button>
      </div>
    </div>

    <!-- Stap 3: laden -->
    <div id="recept-stap-laden" style="display:none">
      <div class="laden-staat">
        <div class="laden-ring"></div>
        <p id="laden-tekst">Recept wordt uitgelezen…</p>
      </div>
    </div>

    <!-- Stap 4: fout -->
    <div id="recept-stap-fout" style="display:none">
      <div class="import-fout">
        <p class="import-fout-tekst" id="import-fout-tekst"></p>
        <button type="button" class="btn-secundair" id="btn-fout-handmatig">Handmatig invoeren</button>
      </div>
    </div>

    <!-- Stap 5: formulier -->
    <div id="recept-stap-form" style="display:none">
    <form id="form-recept" novalidate>

      <!-- Serveermoment (verborgen als er maar 1 is) -->
      <div class="form-veld" id="rf-serveermoment-rij" style="display:none">
        <label for="rf-serveermoment">Serveer-moment</label>
        <select id="rf-serveermoment" class="form-inp"></select>
      </div>

      <div class="form-veld">
        <label for="rf-naam">Naam</label>
        <input type="text" id="rf-naam" class="form-inp" placeholder="Naam van het recept" required maxlength="80" autocomplete="off">
      </div>
      <div class="form-rij">
        <div class="form-veld">
          <label for="rf-porties">Porties</label>
          <input type="number" id="rf-porties" class="form-inp" value="4" min="1" max="100" required>
        </div>
        <div class="form-veld">
          <label for="rf-tijdvenster">Tijdvenster</label>
          <select id="rf-tijdvenster" class="form-inp">
            <option value="week_vooruit">Week van tevoren</option>
            <option value="paar_dagen">Paar dagen van tevoren</option>
            <option value="dag_ervoor">Dag van tevoren</option>
            <option value="ochtend_van" selected>Ochtend van</option>
            <option value="middag_van">Middag van</option>
            <option value="uur_ervoor">Uur van tevoren</option>
            <option value="a_la_minute">Vlak ervoor</option>
          </select>
        </div>
      </div>
      <div class="form-veld">
        <label for="rf-bereidingstijd">Bereidingstijd (min) <span style="color:var(--mu);font-size:10px;text-transform:none;letter-spacing:0">(optioneel)</span></label>

<script>
'use strict';

// ─── Storage shim ─────────────────────────────────────────────────────────────
if (!window.storage) {
  let _store = null;
  try {
    localStorage.setItem('fire:_test', '1');
    localStorage.removeItem('fire:_test');
    _store = localStorage;
    console.info('[Fire] localStorage shim actief');
  } catch (e) {
    console.warn('[Fire] in-memory shim actief (geen persistentie)');
  }
  const _mem = {};
  window.storage = {
    set: async (key, value) => { if (_store) _store.setItem('fire:' + key, value); else _mem[key] = value; },
    get: async (key) => {
      const v = _store ? _store.getItem('fire:' + key) : (_mem[key] ?? null);
      if (v === null || v === undefined) throw new Error('niet gevonden: ' + key);
      return { value: v };
    },
    list: async (prefix) => {
      const keys = [];
      if (_store) {
        for (let i = 0; i < _store.length; i++) {
          const k = _store.key(i);
          if (k && k.startsWith('fire:' + prefix)) keys.push(k.slice(5));
        }
      } else {
        for (const k of Object.keys(_mem)) { if (k.startsWith(prefix)) keys.push(k); }
      }
      return { keys };
    },
    delete: async (key) => { if (_store) _store.removeItem('fire:' + key); else delete _mem[key]; },
  };
}

// ─── Sleutels ────────────────────────────────────────────────────────────────
// componentId is optioneel: null/undefined → enkelvoudig recept (2-delig formaat)
// Met componentId → recept met componenten (3-delig formaat)
function stapAfgevinkSleutel(receptId, stapId, componentId = null) {
  return componentId ? `${receptId}|${componentId}|${stapId}` : `${receptId}|${stapId}`;
}

// ─── Constanten ───────────────────────────────────────────────────────────────
// CSS-kleur-sleutels per tijdvenster (voor var(--tv-X) in de tijdlijn)
const TV_CSS_KLEUR = {
  week_vooruit:    'week',
  paar_dagen:      'paardagen',
  dag_ervoor:      'dag',
  avond_ervoor:    'avond',
  ochtend_van:     'ochtend',
  middag_van:      'middag',
  twee_uur_ervoor: 'tweeuur',
  uur_ervoor:      'uur',
  halfuur_ervoor:  'halfuur',
  a_la_minute:     'alaminute',
  laatste_uur:     'uur',
};

const KLOK_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

// TV_VOLGORDE is de enige canonieke bron voor tijdvenster-volgorde (Fix A, v0.1.8).
// Chronologisch van ver weg → dichtbij. Alle sortering en rendering leidt hieruit af.
const TV_VOLGORDE = [
  'week_vooruit',
  'paar_dagen',
  'dag_ervoor',
  'ochtend_van',
  'middag_van',
  'uur_ervoor',
  'a_la_minute',
];

// TIJDVENSTERS afgeleid van TV_VOLGORDE zodat ze altijd in sync blijven.
const TIJDVENSTERS = {
  week_vooruit: 'Week van tevoren',
  paar_dagen:   'Paar dagen van tevoren',
  dag_ervoor:   'Dag van tevoren',
  ochtend_van:  'Ochtend van',
  middag_van:   'Middag van',
  uur_ervoor:   'Uur van tevoren',
  a_la_minute:  'Vlak ervoor',
};

function tvIndex(tv) {
  const i = TV_VOLGORDE.indexOf(tv);
  return i === -1 ? TV_VOLGORDE.length : i; // onbekende waarden gaan achteraan
}

const PRODUCTGROEPEN = {
  groente_fruit: 'Groente & fruit',
  zuivel_eieren: 'Zuivel & eieren',
  vlees_vis: 'Vlees & vis',
  brood_banket: 'Brood & banket',
  droge_waren: 'Droge waren',
  kruiden_specerijen: 'Kruiden & specerijen',
  olie_azijn_saus: 'Olie, azijn & saus',
  diepvries: 'Diepvries',
  drank: 'Drank',
  overig: 'Overig',
};

const EENHEDEN = [
  { waarde: 'g', label: 'g (gram)' },
  { waarde: 'kg', label: 'kg (kilo)' },
  { waarde: 'ml', label: 'ml' },
  { waarde: 'l', label: 'l (liter)' },
  { waarde: 'el', label: 'el (eetlepel)' },
  { waarde: 'tl', label: 'tl (theelepel)' },
  { waarde: 'snuf', label: 'snuf' },
  { waarde: 'stuks', label: 'stuks' },
  { waarde: 'stengels', label: 'stengels' },
  { waarde: 'teentjes', label: 'teentjes' },
  { waarde: 'bosjes', label: 'bosjes' },
  { waarde: 'blikje', label: 'blikje' },
  { waarde: 'pakje', label: 'pakje' },
  { waarde: '', label: '(geen)' },
];

const EENHEID_NORMALISATIE = {
  'kilo': 'kg', 'kilogram': 'kg', 'gram': 'g', 'grammen': 'g',
  'milliliter': 'ml', 'liter': 'l', 'eetlepel': 'el', 'eetlepels': 'el',
  'theelepel': 'tl', 'theelepels': 'tl', 'stuk': 'stuks',
  'stengel': 'stengels', 'teentje': 'teentjes', 'bosje': 'bosjes',
};

// PrepActie-waarden en labels (voor ingrediënt-formulier en Prep-tab)
const PREP_ACTIES = {
  geen:          '(geen)',
  snijden:       'Snijden',
  hakken:        'Hakken',
  raspen:        'Raspen',
  persen:        'Persen',
  afmeten:       'Afmeten',
  marineren:     'Marineren',
  weken:         'Weken',
  ontdooien:     'Ontdooien',
  op_temperatuur:'Op temperatuur',
  blancheren:    'Blancheren',
};

// ─── Strings ─────────────────────────────────────────────────────────────────
const STRINGS = {
  appNaam: 'Fire',
  opslagFout: 'Er ging iets mis bij het opslaan. Probeer het opnieuw.',
  leegStart: 'Nog geen gelegenheden. Maak je eerste gelegenheid aan om te beginnen.',
  verwijderGelegBevestiging: (naam) => `"${naam}" verwijderen? Dit kan niet ongedaan worden gemaakt.`,
  verwijderReceptBevestiging: (naam) => `Recept "${naam}" verwijderen?`,
};

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  scherm: 'start',
  gelegenheden: [],
  actieveGelegenheidId: null,
  actieveTab: 'overzicht',
  actieveReceptId: null,
  modaalModus: 'aanmaken',
};

// ─── ID-generatie ─────────────────────────────────────────────────────────────
function maakId(prefix) {
  return `${prefix}_${Date.now()}_${Math.random().toString(36).substring(2, 7)}`;
}

// ─── Schema-migratie ──────────────────────────────────────────────────────────
// v1 (Sprint 1/1.5) → v2 (Sprint 2A): voeg serveermomenten toe, koppel recepten
function migreerNaarV2(g) {
  const sm = {
    id: maakId('serv'),
    naam: 'Serveren',
    tijdstip: g.serveerTijd || '12:00',
    volgorde: 1,
  };
  g.serveermomenten = [sm];
  for (const r of (g.recepten || [])) {
    r.serveermomentId = sm.id;
  }
  if (!g.afgevinkteIngredientKeys) g.afgevinkteIngredientKeys = [];
  if (!g.afgevinkteStapKeys) g.afgevinkteStapKeys = [];
  if (!g.afgevinktePrepKeys) g.afgevinktePrepKeys = [];
  g.schemaVersie = 2;
  return g;
}

// ─── Storage-laag ─────────────────────────────────────────────────────────────
async function loadAllGelegenheden() {
  const lijst = [];
  try {
    const result = await window.storage.list('gelegenheden:');
    for (const key of result.keys) {
      try {
        const entry = await window.storage.get(key);
        lijst.push(JSON.parse(entry.value));
      } catch (e) { console.warn('[Fire] kon gelegenheid niet laden:', key, e); }
    }
  } catch (e) { console.warn('[Fire] storage.list mislukt:', e); }
  // Normaliseer eenheden en tijdvensters voor backward compatibility
  // TV_MIGRATIE: oude sleutels (pre-Fix2) → dichtstbijzijnde nieuwe sleutel
  const TV_MIGRATIE = {
    laatste_uur:     'uur_ervoor',
    avond_ervoor:    'dag_ervoor',
    twee_uur_ervoor: 'uur_ervoor',
    halfuur_ervoor:  'a_la_minute',
  };
  function normaliseerTv(tv) {
    return TV_MIGRATIE[tv] || tv;
  }
  for (const g of lijst) {
    for (const r of (g.recepten || [])) {
      r.tijdvenster = normaliseerTv(r.tijdvenster);
      for (const ing of (r.ingredienten || [])) {
        const lower = (ing.eenheid || '').toLowerCase().trim();
        if (EENHEID_NORMALISATIE[lower] !== undefined) {
          ing.eenheid = EENHEID_NORMALISATIE[lower];
        }
      }
      for (const s of (r.stappen || [])) {
        if (s.tijdvenster) s.tijdvenster = normaliseerTv(s.tijdvenster);
      }
      for (const comp of (r.componenten || [])) {
        comp.tijdvenster = normaliseerTv(comp.tijdvenster);
        for (const s of (comp.stappen || [])) {
          if (s.tijdvenster) s.tijdvenster = normaliseerTv(s.tijdvenster);
        }
      }
    }
  }
  // Migreer naar schema versie 2 indien nodig, sla direct op
  for (const g of lijst) {
    if (!g.schemaVersie || g.schemaVersie < 2) {
      migreerNaarV2(g);
      try { await saveGelegenheid(g); }
      catch (e) { console.warn('[Fire] migratie v2 opslaan mislukt:', g.id, e); }
    }
  }
  sorteerGelegenheden(lijst);
  return lijst;
}

async function saveGelegenheid(gelegenheid) {
  gelegenheid.gewijzigd = new Date().toISOString();
  gelegenheid.schemaVersie = 2;
  try {
    await window.storage.set(`gelegenheden:${gelegenheid.id}`, JSON.stringify(gelegenheid));
  } catch (e) {
    console.error('[Fire] saveGelegenheid mislukt:', e);
    throw e;
  }
}

async function deleteGelegenheid(id) {
  try { await window.storage.delete(`gelegenheden:${id}`); }
  catch (e) { console.error('[Fire] deleteGelegenheid mislukt:', e); throw e; }
}

function sorteerGelegenheden(lijst) {
  lijst.sort((a, b) => (b.datum || '').localeCompare(a.datum || ''));
}

// ─── Recept-helpers ───────────────────────────────────────────────────────────
function actieveGelegenheid() {
  return state.gelegenheden.find(g => g.id === state.actieveGelegenheidId) || null;
}

function voegReceptToe(g, recept) { g.recepten.push(recept); }

function verwijderRecept(g, receptId) {
  g.recepten = g.recepten.filter(r => r.id !== receptId);
}

function vindRecept(g, receptId) {
  return g.recepten.find(r => r.id === receptId) || null;
}

// ─── Schalen ──────────────────────────────────────────────────────────────────
function schaalHoeveelheid(hoeveelheid, origineel, geschaald, eenheid) {
  if (hoeveelheid === null) return null;
  const v = hoeveelheid * geschaald / origineel;
  if (eenheid === 'tl' || eenheid === 'el') return Math.round(v * 4) / 4;
  if (v < 10) return Math.round(v * 2) / 2;
  return Math.round(v);
}

function formateerIngredient(ing, origineel, geschaald) {
  const h = ing.hoeveelheid !== null
    ? schaalHoeveelheid(ing.hoeveelheid, origineel, geschaald, ing.eenheid)
    : null;
  const hTekst = h !== null ? (ing.eenheid ? `${h}\u202f${ing.eenheid}` : `${h}`) : '';
  const opm = ing.opmerking ? ` (${ing.opmerking})` : '';
  return [hTekst, ing.naam].filter(Boolean).join(' ') + opm;
}

// ─── Navigatie ────────────────────────────────────────────────────────────────
function toonScherm(naam) {
  document.querySelectorAll('.scherm').forEach(el => el.classList.remove('actief'));
  document.getElementById(`scherm-${naam}`).classList.add('actief');
  state.scherm = naam;
  window.scrollTo(0, 0);
}

function naarStartscherm() {
  state.actieveGelegenheidId = null;
  state.actieveReceptId = null;
  renderStartscherm();
  toonScherm('start');
}

// ─── Datum-helper ─────────────────────────────────────────────────────────────
function formateerDatum(iso) {
  if (!iso) return '';
  return new Date(iso + 'T00:00:00').toLocaleDateString('nl-NL', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

// ─── Startscherm ──────────────────────────────────────────────────────────────
function renderStartscherm() {
  const container = document.getElementById('geleg-inhoud');
  if (state.gelegenheden.length === 0) {
    container.innerHTML = `<div class="leeg-staat"><p>${STRINGS.leegStart}</p></div>`;
    return;
  }
  const items = state.gelegenheden.map(g => {
    const n = g.recepten.length;
    const datumTekst = g.datum ? `${formateerDatum(g.datum)} · ` : '';
    return `
      <div class="geleg-kaart" data-id="${g.id}" role="button" tabindex="0">
        <div class="geleg-info">
          <div class="geleg-naam">${escHtml(g.naam)}</div>
          <div class="geleg-meta">${datumTekst}${(() => { const sm = (g.serveermomenten || []).sort((a,b)=>a.tijdstip.localeCompare(b.tijdstip))[0]; return sm ? sm.tijdstip : (g.serveerTijd || ''); })()} · ${g.aantalPersonen} personen · ${n === 1 ? '1 recept' : n + ' recepten'}</div>
        </div>
        <div class="geleg-acties">
          <button class="btn-icon btn-verwijder-geleg" data-id="${g.id}" title="Verwijderen">
            <svg width="15" height="15"><use href="#ic-trash"/></svg>
          </button>
          <svg width="14" height="14" style="color:var(--mu)"><use href="#ic-chevron-right"/></svg>
        </div>
      </div>`;
  }).join('');
  container.innerHTML = `<div class="gelegenheden-lijst">${items}</div>`;

  container.querySelectorAll('.geleg-kaart').forEach(k => {
    k.addEventListener('click', (e) => { if (!e.target.closest('.btn-verwijder-geleg')) openGelegenheid(k.dataset.id); });
    k.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.target.closest('.btn-verwijder-geleg')) openGelegenheid(k.dataset.id); });
  });
  container.querySelectorAll('.btn-verwijder-geleg').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); bevestigVerwijderGelegenheid(btn.dataset.id); });
  });
}

// ─── Gelegenheid openen ───────────────────────────────────────────────────────
function openGelegenheid(id) {
  state.actieveGelegenheidId = id;
  state.actieveReceptId = null;
  state.actieveTab = 'overzicht';
  renderGelegenheidHeader();
  wisselTab('overzicht');
  toonScherm('gelegenheid');
}

function renderGelegenheidHeader() {
  const g = actieveGelegenheid();
  if (!g) return;
  document.getElementById('geleg-header-titel').textContent = g.naam;
  const eersteSm = (g.serveermomenten || []).sort((a, b) => a.tijdstip.localeCompare(b.tijdstip))[0];
  const tijdTekst = eersteSm ? eersteSm.tijdstip : (g.serveerTijd || '');
  const delen = [];
  if (g.datum) delen.push(formateerDatum(g.datum));
  delen.push(tijdTekst, `${g.aantalPersonen} personen`);
  document.getElementById('geleg-header-meta').textContent = delen.join(' · ');
}

// ─── Tab-navigatie ────────────────────────────────────────────────────────────
function wisselTab(tabNaam) {
  state.actieveTab = tabNaam;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('actief', t.dataset.tab === tabNaam));
  document.querySelectorAll('.tab-inhoud').forEach(t => t.classList.toggle('actief', t.id === `tab-${tabNaam}`));
  const g = actieveGelegenheid();
  if (tabNaam === 'overzicht') renderOverzichtTab(g);
  else if (tabNaam === 'recepten') renderReceptenTab(g);
  else if (tabNaam === 'boodschappen') renderBoodschappenTab(g);
  else if (tabNaam === 'tijdlijn') renderTijdlijnTab(g);
}

// ─── Overzicht-tab ────────────────────────────────────────────────────────────
function maakReceptKaart(r) {
  const tvKleur = `var(--tv-${TV_CSS_KLEUR[r.tijdvenster] || 'ochtend'})`;
  const aantalIngs = r.ingredienten ? r.ingredienten.length : 0;
  const aantalStappen = r.stappen ? r.stappen.length : 0;
  return `<div class="ov-recept-kaart" data-recept-id="${r.id}">
    <div style="flex:1;min-width:0">
      <div class="ov-recept-naam">${escHtml(r.naam)}</div>
      <div class="ov-recept-meta">${aantalIngs} ingrediënten · ${aantalStappen} stappen</div>
    </div>
    <span class="tijdvenster-badge" style="color:${tvKleur}">${TIJDVENSTERS[r.tijdvenster] || r.tijdvenster}</span>
  </div>`;
}

function renderOverzichtTab(g) {
  if (!g) return;
  const container = document.getElementById('overzicht-inhoud');
  const n = g.recepten.length;

  if (n === 0) {
    container.innerHTML = `
      <div class="tab-leeg">Nog geen recepten. Voeg je eerste recept toe.</div>
      <button class="btn-toevoegen" id="ov-btn-add">
        <svg width="13" height="13"><use href="#ic-plus"/></svg> Recept toevoegen
      </button>`;
    container.querySelector('#ov-btn-add').addEventListener('click', openReceptForm);
    return;
  }

  // Stats
  const totaalStappen = g.recepten.reduce((s, r) => s + (r.stappen ? r.stappen.length : 0), 0);
  const afgevinkteStapSet = new Set(g.afgevinkteStapKeys || []);
  const afgevinkteStapCount = g.recepten.reduce((s, r) =>
    s + (r.stappen || []).filter(st => afgevinkteStapSet.has(stapAfgevinkSleutel(r.id, st.id))).length, 0);

  const sms = [...(g.serveermomenten || [])].sort((a, b) => a.tijdstip.localeCompare(b.tijdstip));
  const multiMoment = sms.length > 1;

  let statsHtml = `<div class="ov-stats">
    <div class="ov-stat">
      <span class="ov-stat-getal">${n}</span>
      <span class="ov-stat-label">Recepten</span>
    </div>
    ${multiMoment ? `<div class="ov-stat">
      <span class="ov-stat-getal">${sms.length}</span>
      <span class="ov-stat-label">Momenten</span>
    </div>` : ''}
    ${totaalStappen > 0 ? `<div class="ov-stat">
      <span class="ov-stat-getal">${afgevinkteStapCount}/${totaalStappen}</span>
      <span class="ov-stat-label">Stappen gedaan</span>
    </div>` : ''}
  </div>`;

  // Recepten-kaarten: gegroepeerd per serveermoment als er meer dan 1 is
  let receptenHtml = '';
  if (multiMoment) {
    const smIds = new Set(sms.map(sm => sm.id));
    for (const sm of sms) {
      const rijen = g.recepten.filter(r => r.serveermomentId === sm.id);
      if (!rijen.length) continue;
      receptenHtml += `<div class="ov-serveerm-kop">${sm.tijdstip} — ${escHtml(sm.naam)}</div>`;
      receptenHtml += rijen.map(maakReceptKaart).join('');
    }
    // Recepten zonder geldig serveermomentId (edge case na incomplete migratie)
    const wezen = g.recepten.filter(r => !smIds.has(r.serveermomentId));
    if (wezen.length) {
      receptenHtml += `<div class="ov-serveerm-kop">Overig</div>`;
      receptenHtml += wezen.map(maakReceptKaart).join('');
    }
  } else {
    // Enkelvoudig: platte lijst (zoals v1.0.0)
    receptenHtml = g.recepten.map(maakReceptKaart).join('');
  }

  container.innerHTML = statsHtml + receptenHtml + `
    <button class="btn-toevoegen" id="ov-btn-add" style="margin-top:8px">
      <svg width="13" height="13"><use href="#ic-plus"/></svg> Recept toevoegen
    </button>`;

  container.querySelectorAll('.ov-recept-kaart').forEach(k => {
    k.addEventListener('click', () => {
      state.actieveReceptId = k.dataset.receptId;
      wisselTab('recepten');
    });
  });
  container.querySelector('#ov-btn-add').addEventListener('click', openReceptForm);
}

// ─── Recepten-tab ─────────────────────────────────────────────────────────────
function renderReceptenTab(g) {
  if (!g) return;
  const chips = document.getElementById('recept-chips-balk');
  const detail = document.getElementById('recept-detail-container');

let _wakeLock = null;
let _cookReceptId = null;
let _cookComponentIdx = 0;
const _timerStarts = {}; // stapId → Date.now() van start, of null

async function openCookMode(receptId) {
  _cookReceptId = receptId;
  _cookComponentIdx = 0;
  renderCookMode();
  document.getElementById('cook-mode').classList.add('actief');
  document.body.style.overflow = 'hidden';
  await vraagWakeLock();
}

function sluitCookMode() {
  document.getElementById('cook-mode').classList.remove('actief');
  document.body.style.overflow = '';
  _cookReceptId = null;
  // Stop alle timers
  for (const id of Object.keys(_timerStarts)) delete _timerStarts[id];
  laatWakeLockLos();
}

async function vraagWakeLock() {
  if (!navigator.wakeLock) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {
    // Wake Lock niet beschikbaar of geweigerd — stilletjes doorgaan
  }
}

async function laatWakeLockLos() {
  if (_wakeLock) {
    try { await _wakeLock.release(); } catch (e) {}
    _wakeLock = null;
  }
}

// Heraan vragen na tab-switch terug
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && _cookReceptId && !_wakeLock) {
    await vraagWakeLock();
  }
});

function renderCookMode() {
  const g = actieveGelegenheid();
  const r = g ? g.recepten.find(r => r.id === _cookReceptId) : null;
  if (!r) { sluitCookMode(); return; }

  if (!g.afgevinkteStapKeys) g.afgevinkteStapKeys = [];
  const afgevinkt = new Set(g.afgevinkteStapKeys);

  document.getElementById('cook-titel').textContent = r.naam;

  const body = document.getElementById('cook-body');
  const heeftComps = r.componenten && r.componenten.length > 0;

  function maakTimerHtml(s) {
    return s.timerMinuten
      ? `<div class="cook-timer">
           <button class="cook-timer-btn" data-stap-id="${escHtml(s.id)}" data-minuten="${s.timerMinuten}">
             Start timer (${s.timerMinuten} min)
           </button>
           <span class="cook-timer-display" id="timer-${escHtml(s.id)}"></span>
         </div>`
      : '';
  }

  if (heeftComps) {
    if (_cookComponentIdx < 0) _cookComponentIdx = 0;
    if (_cookComponentIdx >= r.componenten.length) _cookComponentIdx = r.componenten.length - 1;
    const comp = r.componenten[_cookComponentIdx];

    const navHtml = `
      <div class="cook-nav">
        <button class="cook-nav-btn" id="cook-prev-comp" ${_cookComponentIdx === 0 ? 'disabled' : ''}>← Vorige</button>
        <div class="cook-comp-indicator">${escHtml(comp.naam)} (${_cookComponentIdx + 1}/${r.componenten.length})</div>
        <button class="cook-nav-btn" id="cook-next-comp" ${_cookComponentIdx >= r.componenten.length - 1 ? 'disabled' : ''}>Volgende →</button>
      </div>`;

    const ingHtml = comp.ingredienten.length
      ? comp.ingredienten.map(ing =>
          `<div class="cook-ing-item">${escHtml(formateerIngredient(ing, r.origineelAantalPersonen, r.geschaaldAantalPersonen))}</div>`
        ).join('')
      : `<p style="color:var(--mu);font-size:14px">Geen ingrediënten.</p>`;

    const stappenHtml = comp.stappen.length
      ? comp.stappen.map(s => {
          const sleutel = stapAfgevinkSleutel(r.id, s.id, comp.id);
          const isAf = afgevinkt.has(sleutel);
          const tvInd = maakStapTvIndicatorHtml(s.tijdvenster || '', comp.tijdvenster || r.tijdvenster || 'ochtend_van', false, '');
          return `<div class="cook-stap${isAf ? ' afgevinkt' : ''}" data-sleutel="${escHtml(sleutel)}">
            <div class="cook-stap-nr">${s.nummer}</div>
            <div class="cook-stap-body">
              <div class="cook-stap-tekst">${escHtml(s.tekst)}</div>
              ${tvInd}
              ${maakTimerHtml(s)}
            </div>
          </div>`;
        }).join('')
      : `<p style="color:var(--mu);font-size:14px">Geen stappen.</p>`;

    body.innerHTML = `${navHtml}
      <div class="cook-sectie-kop">Ingrediënten</div>
      <div id="cook-ings">${ingHtml}</div>
      <div class="cook-sectie-kop">Stappen</div>
      <div id="cook-stappen">${stappenHtml}</div>`;

    body.querySelector('#cook-prev-comp')?.addEventListener('click', () => { _cookComponentIdx--; renderCookMode(); });
    body.querySelector('#cook-next-comp')?.addEventListener('click', () => { _cookComponentIdx++; renderCookMode(); });

  } else {
    const ingHtml = r.ingredienten.length
      ? r.ingredienten.map(ing =>
          `<div class="cook-ing-item">${escHtml(formateerIngredient(ing, r.origineelAantalPersonen, r.geschaaldAantalPersonen))}</div>`
        ).join('')
      : `<p style="color:var(--mu);font-size:14px">Geen ingrediënten.</p>`;

    const stappenHtml = r.stappen.length
      ? r.stappen.map(s => {
          const sleutel = stapAfgevinkSleutel(r.id, s.id);
          const isAf = afgevinkt.has(sleutel);
          const tvInd = maakStapTvIndicatorHtml(s.tijdvenster || '', r.tijdvenster || 'ochtend_van', false, '');
          return `<div class="cook-stap${isAf ? ' afgevinkt' : ''}" data-sleutel="${escHtml(sleutel)}">
            <div class="cook-stap-nr">${s.nummer}</div>
            <div class="cook-stap-body">
              <div class="cook-stap-tekst">${escHtml(s.tekst)}</div>
              ${tvInd}
              ${maakTimerHtml(s)}
            </div>
          </div>`;
        }).join('')
      : `<p style="color:var(--mu);font-size:14px">Geen stappen.</p>`;

    body.innerHTML = `
      <div class="cook-sectie-kop">Ingrediënten</div>
      <div id="cook-ings">${ingHtml}</div>
      <div class="cook-sectie-kop">Stappen</div>
      <div id="cook-stappen">${stappenHtml}</div>`;
  }

  // Stap afvinken (gemeenschappelijk)
  body.querySelectorAll('.cook-stap').forEach(el => {
    el.addEventListener('click', async (e) => {
      if (e.target.closest('.cook-timer-btn')) return;
      const sleutel = el.dataset.sleutel;
      const set = new Set(g.afgevinkteStapKeys || []);
      if (set.has(sleutel)) set.delete(sleutel); else set.add(sleutel);
      g.afgevinkteStapKeys = [...set];
      try { await saveGelegenheid(g); } catch (e) {}
      el.classList.toggle('afgevinkt');
    });
  });

  // Timer-knoppen (gemeenschappelijk)
  body.querySelectorAll('.cook-timer-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const stapId = btn.dataset.stapId;
      const minuten = parseInt(btn.dataset.minuten, 10);
      if (_timerStarts[stapId]) {
        delete _timerStarts[stapId];
        btn.textContent = `Start timer (${minuten} min)`;
        btn.classList.remove('actief');
        const display = document.getElementById(`timer-${stapId}`);
        if (display) { display.textContent = ''; display.className = 'cook-timer-display'; }
      } else {
        _timerStarts[stapId] = Date.now() + minuten * 60 * 1000;
        btn.textContent = 'Stop timer';
        btn.classList.add('actief');
        tickTimer(stapId);
      }
    });
  });
}

function tickTimer(stapId) {
  if (!_timerStarts[stapId] || !_cookReceptId) return;
  const display = document.getElementById(`timer-${stapId}`);
  if (!display) return;
  const restMs = _timerStarts[stapId] - Date.now();
  if (restMs <= 0) {
    display.textContent = '0:00';
    display.className = 'cook-timer-display verlopen';
    delete _timerStarts[stapId];
    const btn = display.previousElementSibling;
    if (btn) { btn.classList.remove('actief'); btn.textContent = `Start timer`; }
    // Geluidje via korte AudioContext beep
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 1.2);
    } catch (e) {}
    return;
  }
  const totaalSec = Math.ceil(restMs / 1000);
  const min = Math.floor(totaalSec / 60);
  const sec = totaalSec % 60;
  display.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
  display.className = 'cook-timer-display actief';
  requestAnimationFrame(() => tickTimer(stapId));
}
